<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galactic Garbage Collector</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(45deg, #0a0a2e, #16213e);
            font-family: 'Courier New', monospace;
        }
        #game-container {
            border: 2px solid #333;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <script>
        class GameScene extends Phaser.Scene {
            constructor() {
                super({ key: 'GameScene' });
                this.score = 0;
                this.health = 3;
                this.fuel = 100;
                this.maxFuel = 100;
                this.shieldsActive = false;
                this.gameOver = false;
                this.waveNumber = 1;
                this.enemiesInWave = 3;
                this.enemiesSpawned = 0;
                this.debris = [];
                this.debrisCarried = 0;
                this.lastFuelDrain = 0;
                this.lastDebrisSpawn = 0;
                this.lastEnemySpawn = 0;
                this.explosions = [];
                this.stars = [];
                this.screenShake = 0;
            }

            preload() {
                this.createAssets();
            }

            createAssets() {
                // Create player ship texture
                this.add.graphics()
                    .fillStyle(0x00ff00)
                    .fillTriangle(0, 0, -10, 20, 10, 20)
                    .fillStyle(0x0088ff)
                    .fillRect(-3, 15, 6, 8)
                    .generateTexture('player', 20, 25);

                // Create enemy texture
                this.add.graphics()
                    .fillStyle(0xff0000)
                    .fillTriangle(0, 20, -12, 0, 12, 0)
                    .fillStyle(0xff6600)
                    .fillRect(-4, 5, 8, 6)
                    .generateTexture('enemy', 24, 20);

                // Create laser texture
                this.add.graphics()
                    .fillStyle(0x00ffff)
                    .fillRect(0, 0, 2, 8)
                    .generateTexture('laser', 2, 8);

                // Create enemy laser texture
                this.add.graphics()
                    .fillStyle(0xff4444)
                    .fillRect(0, 0, 2, 6)
                    .generateTexture('enemyLaser', 2, 6);

                // Create debris textures
                this.add.graphics()
                    .fillStyle(0x888888)
                    .fillRect(0, 0, 8, 8)
                    .fillStyle(0xaaaaaa)
                    .fillRect(2, 2, 4, 4)
                    .generateTexture('debris1', 8, 8);

                this.add.graphics()
                    .fillStyle(0x0066ff)
                    .fillCircle(6, 6, 6)
                    .fillStyle(0x0088ff)
                    .fillCircle(6, 6, 3)
                    .generateTexture('debris2', 12, 12);

                this.add.graphics()
                    .fillStyle(0xffaa00)
                    .fillPolygon([6, 0, 12, 6, 6, 12, 0, 6])
                    .fillStyle(0xffcc33)
                    .fillCircle(6, 6, 3)
                    .generateTexture('debris3', 12, 12);

                // Create recycling station
                this.add.graphics()
                    .fillStyle(0x00ff88)
                    .fillRect(0, 0, 60, 30)
                    .fillStyle(0x00cc66)
                    .fillRect(5, 5, 50, 20)
                    .fillStyle(0x88ffcc)
                    .fillRect(10, 8, 40, 14)
                    .generateTexture('station', 60, 30);

                // Create shield effect
                this.add.graphics()
                    .lineStyle(3, 0x00ffff, 0.7)
                    .strokeCircle(15, 15, 15)
                    .generateTexture('shield', 30, 30);
            }

            create() {
                // Create starfield background
                this.createStarfield();

                // Initialize physics
                this.physics.world.setBounds(0, 0, 800, 600);

                // Create groups
                this.playerLasers = this.physics.add.group();
                this.enemyLasers = this.physics.add.group();
                this.enemies = this.physics.add.group();
                this.debrisGroup = this.physics.add.group();

                // Create player
                this.player = this.physics.add.sprite(400, 500, 'player');
                this.player.setCollideWorldBounds(true);
                this.player.setDrag(200);

                // Create recycling station
                this.station = this.physics.add.sprite(400, 50, 'station');
                this.station.body.setImmovable(true);

                // Create shield sprite (initially hidden)
                this.shieldSprite = this.add.sprite(400, 500, 'shield');
                this.shieldSprite.setVisible(false);
                this.shieldSprite.setAlpha(0.6);

                // Create controls
                this.cursors = this.input.keyboard.createCursorKeys();
                this.wasd = this.input.keyboard.addKeys('W,S,A,D,SPACE,SHIFT');

                // Create UI
                this.scoreText = this.add.text(16, 16, 'Score: 0', {
                    fontSize: '18px',
                    fill: '#00ff00'
                });
                this.healthText = this.add.text(16, 40, 'Health: 3', {
                    fontSize: '18px',
                    fill: '#ff0000'
                });
                this.fuelText = this.add.text(16, 64, 'Fuel: 100', {
                    fontSize: '18px',
                    fill: '#ffff00'
                });
                this.debrisText = this.add.text(16, 88, 'Debris: 0', {
                    fontSize: '18px',
                    fill: '#ffffff'
                });
                this.waveText = this.add.text(600, 16, 'Wave: 1', {
                    fontSize: '18px',
                    fill: '#00ffff'
                });

                // Set up collisions
                this.physics.add.overlap(this.player, this.debrisGroup, this.collectDebris, null, this);
                this.physics.add.overlap(this.player, this.station, this.deliverDebris, null, this);
                this.physics.add.overlap(this.player, this.enemies, this.playerHitEnemy, null, this);
                this.physics.add.overlap(this.player, this.enemyLasers, this.playerHitByLaser, null, this);
                this.physics.add.overlap(this.playerLasers, this.enemies, this.laserHitEnemy, null, this);
                this.physics.add.overlap(this.playerLasers, this.debrisGroup, this.laserHitDebris, null, this);

                // Initialize timers
                this.lastShot = 0;
                this.shotDelay = 200;

                // Create initial debris
                this.spawnDebris();

                // Create sounds
                this.createSounds();
            }

            createStarfield() {
                for (let i = 0; i < 100; i++) {
                    const star = {
                        x: Phaser.Math.Between(0, 800),
                        y: Phaser.Math.Between(0, 600),
                        speed: Phaser.Math.FloatBetween(0.5, 2),
                        size: Phaser.Math.Between(1, 3)
                    };
                    this.stars.push(star);
                }
            }

            createSounds() {
                // Create Web Audio context for sound effects
                this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                this.playLaserSound = () => {
                    const oscillator = this.audioContext.createOscillator();
                    const gainNode = this.audioContext.createGain();
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(this.audioContext.destination);
                    
                    oscillator.frequency.setValueAtTime(800, this.audioContext.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(200, this.audioContext.currentTime + 0.1);
                    
                    gainNode.gain.setValueAtTime(0.1, this.audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + 0.1);
                    
                    oscillator.start(this.audioContext.currentTime);
                    oscillator.stop(this.audioContext.currentTime + 0.1);
                };

                this.playExplosionSound = () => {
                    const oscillator = this.audioContext.createOscillator();
                    const gainNode = this.audioContext.createGain();
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(this.audioContext.destination);
                    
                    oscillator.frequency.setValueAtTime(150, this.audioContext.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(50, this.audioContext.currentTime + 0.3);
                    oscillator.type = 'sawtooth';
                    
                    gainNode.gain.setValueAtTime(0.2, this.audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + 0.3);
                    
                    oscillator.start(this.audioContext.currentTime);
                    oscillator.stop(this.audioContext.currentTime + 0.3);
                };

                this.playCollectSound = () => {
                    const oscillator = this.audioContext.createOscillator();
                    const gainNode = this.audioContext.createGain();
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(this.audioContext.destination);
                    
                    oscillator.frequency.setValueAtTime(400, this.audioContext.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(800, this.audioContext.currentTime + 0.1);
                    
                    gainNode.gain.setValueAtTime(0.1, this.audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + 0.1);
                    
                    oscillator.start(this.audioContext.currentTime);
                    oscillator.stop(this.audioContext.currentTime + 0.1);
                };
            }

            update(time, delta) {
                if (this.gameOver) return;

                // Update starfield
                this.updateStarfield();

                // Handle input
                this.handleInput(time);

                // Update fuel
                if (time - this.lastFuelDrain > 100) {
                    if (this.shieldsActive) {
                        this.fuel = Math.max(0, this.fuel - 0.5);
                    } else {
                        this.fuel = Math.max(0, this.fuel - 0.1);
                    }
                    this.lastFuelDrain = time;
                }

                // Update shield position
                this.shieldSprite.x = this.player.x;
                this.shieldSprite.y = this.player.y;

                // Spawn enemies
                if (time - this.lastEnemySpawn > 2000 && this.enemiesSpawned < this.enemiesInWave) {
                    this.spawnEnemy();
                    this.lastEnemySpawn = time;
                }

                // Spawn debris
                if (time - this.lastDebrisSpawn > 3000) {
                    this.spawnDebris();
                    this.lastDebrisSpawn = time;
                }

                // Update enemies
                this.enemies.children.entries.forEach(enemy => {
                    this.updateEnemy(enemy, time);
                });

                // Clean up off-screen objects
                this.cleanupObjects();

                // Update explosions
                this.updateExplosions(delta);

                // Update UI
                this.updateUI();

                // Check game over conditions
                this.checkGameOver();

                // Check for next wave
                if (this.enemies.children.size === 0 && this.enemiesSpawned >= this.enemiesInWave) {
                    this.startNextWave();
                }

                // Handle screen shake
                if (this.screenShake > 0) {
                    this.cameras.main.setScroll(
                        Phaser.Math.Between(-this.screenShake, this.screenShake),
                        Phaser.Math.Between(-this.screenShake, this.screenShake)
                    );
                    this.screenShake *= 0.9;
                    if (this.screenShake < 0.1) {
                        this.screenShake = 0;
                        this.cameras.main.setScroll(0, 0);
                    }
                }
            }

            updateStarfield() {
                this.add.graphics().clear();
                const graphics = this.add.graphics();
                
                this.stars.forEach(star => {
                    star.y += star.speed;
                    if (star.y > 600) {
                        star.y = 0;
                        star.x = Phaser.Math.Between(0, 800);
                    }
                    
                    graphics.fillStyle(0xffffff, star.size / 3);
                    graphics.fillCircle(star.x, star.y, star.size);
                });
            }

            handleInput(time) {
                const speed = 300;

                // Movement
                if (this.cursors.left.isDown || this.wasd.A.isDown) {
                    this.player.setVelocityX(-speed);
                } else if (this.cursors.right.isDown || this.wasd.D.isDown) {
                    this.player.setVelocityX(speed);
                } else {
                    this.player.setVelocityX(0);
                }

                if (this.cursors.up.isDown || this.wasd.W.isDown) {
                    this.player.setVelocityY(-speed);
                } else if (this.cursors.down.isDown || this.wasd.S.isDown) {
                    this.player.setVelocityY(speed);
                } else {
                    this.player.setVelocityY(0);
                }

                // Shooting
                if ((this.cursors.space.isDown || this.wasd.SPACE.isDown) && time - this.lastShot > this.shotDelay) {
                    this.shootLaser();
                    this.lastShot = time;
                }

                // Shields
                if (this.wasd.SHIFT.isDown && this.fuel > 0) {
                    this.shieldsActive = true;
                    this.shieldSprite.setVisible(true);
                } else {
                    this.shieldsActive = false;
                    this.shieldSprite.setVisible(false);
                }
            }

            shootLaser() {
                const laser = this.physics.add.sprite(this.player.x, this.player.y - 15, 'laser');
                laser.setVelocityY(-500);
                this.playerLasers.add(laser);
                this.playLaserSound();
            }

            spawnEnemy() {
                const x = Phaser.Math.Between(50, 750);
                const enemy = this.physics.add.sprite(x, -20, 'enemy');
                enemy.setVelocity(Phaser.Math.Between(-50, 50), Phaser.Math.Between(50, 100));
                enemy.lastShot = 0;
                this.enemies.add(enemy);
                this.enemiesSpawned++;
            }

            updateEnemy(enemy, time) {
                // Simple AI: move towards player and shoot occasionally
                const distanceToPlayer = Phaser.Math.Distance.Between(enemy.x, enemy.y, this.player.x, this.player.y);
                
                if (distanceToPlayer < 200 && time - enemy.lastShot > 1500) {
                    this.enemyShoot(enemy);
                    enemy.lastShot = time;
                }

                // Keep enemies on screen
                if (enemy.x < 0 || enemy.x > 800) {
                    enemy.setVelocityX(-enemy.body.velocity.x);
                }
            }

            enemyShoot(enemy) {
                const laser = this.physics.add.sprite(enemy.x, enemy.y + 15, 'enemyLaser');
                laser.setVelocityY(300);
                this.enemyLasers.add(laser);
            }

            spawnDebris() {
                const debrisTypes = ['debris1', 'debris2', 'debris3'];
                const debrisType = Phaser.Utils.Array.GetRandom(debrisTypes);
                const x = Phaser.Math.Between(50, 750);
                const y = Phaser.Math.Between(100, 400);
                
                const debris = this.physics.add.sprite(x, y, debrisType);
                debris.setVelocity(Phaser.Math.Between(-30, 30), Phaser.Math.Between(-30, 30));
                debris.debrisType = debrisType;
                this.debrisGroup.add(debris);
            }

            collectDebris(player, debris) {
                this.playCollectSound();
                
                // Different debris types have different effects
                switch (debris.debrisType) {
                    case 'debris1':
                        this.debrisCarried += 1;
                        break;
                    case 'debris2':
                        this.debrisCarried += 2;
                        this.fuel = Math.min(this.maxFuel, this.fuel + 10);
                        break;
                    case 'debris3':
                        this.debrisCarried += 3;
                        this.fuel = Math.min(this.maxFuel, this.fuel + 5);
                        break;
                }
                
                debris.destroy();
            }

            deliverDebris(player, station) {
                if (this.debrisCarried > 0) {
                    this.score += this.debrisCarried * 10;
                    this.debrisCarried = 0;
                    this.playCollectSound();
                }
            }

            playerHitEnemy(player, enemy) {
                if (!this.shieldsActive) {
                    this.takeDamage();
                }
                this.createExplosion(enemy.x, enemy.y);
                this.playExplosionSound();
                enemy.destroy();
            }

            playerHitByLaser(player, laser) {
                if (!this.shieldsActive) {
                    this.takeDamage();
                }
                laser.destroy();
            }

            laserHitEnemy(laser, enemy) {
                this.score += 50;
                this.createExplosion(enemy.x, enemy.y);
                this.playExplosionSound();
                this.screenShake = 5;
                laser.destroy();
                enemy.destroy();
            }

            laserHitDebris(laser, debris) {
                // Lasers destroy debris without collecting it
                debris.destroy();
                laser.destroy();
            }

            takeDamage() {
                this.health--;
                this.screenShake = 10;
                
                if (this.health <= 0) {
                    this.gameOver = true;
                    this.showGameOver();
                }
            }

            createExplosion(x, y) {
                const explosion = {
                    x: x,
                    y: y,
                    particles: [],
                    life: 1.0
                };

                // Create particles
                for (let i = 0; i < 10; i++) {
                    explosion.particles.push({
                        x: x,
                        y: y,
                        vx: Phaser.Math.Between(-100, 100),
                        vy: Phaser.Math.Between(-100, 100),
                        life: 1.0
                    });
                }

                this.explosions.push(explosion);
            }

            updateExplosions(delta) {
                this.explosions = this.explosions.filter(explosion => {
                    explosion.life -= delta / 500;
                    
                    if (explosion.life <= 0) return false;

                    const graphics = this.add.graphics();
                    
                    explosion.particles.forEach(particle => {
                        particle.x += particle.vx * delta / 1000;
                        particle.y += particle.vy * delta / 1000;
                        particle.life -= delta / 500;
                        
                        if (particle.life > 0) {
                            graphics.fillStyle(0xff6600, particle.life);
                            graphics.fillCircle(particle.x, particle.y, 3 * particle.life);
                        }
                    });

                    return true;
                });
            }

            cleanupObjects() {
                // Remove off-screen lasers
                this.playerLasers.children.entries.forEach(laser => {
                    if (laser.y < -10) laser.destroy();
                });

                this.enemyLasers.children.entries.forEach(laser => {
                    if (laser.y > 610) laser.destroy();
                });

                // Remove off-screen enemies
                this.enemies.children.entries.forEach(enemy => {
                    if (enemy.y > 650) enemy.destroy();
                });
            }

            startNextWave() {
                this.waveNumber++;
                this.enemiesInWave = Math.min(10, this.enemiesInWave + 2);
                this.enemiesSpawned = 0;
                this.score += 100; // Wave completion bonus
            }

            updateUI() {
                this.scoreText.setText('Score: ' + this.score);
                this.healthText.setText('Health: ' + this.health);
                this.fuelText.setText('Fuel: ' + Math.floor(this.fuel));
                this.debrisText.setText('Debris: ' + this.debrisCarried);
                this.waveText.setText('Wave: ' + this.waveNumber);
            }

            checkGameOver() {
                if (this.fuel <= 0 && !this.gameOver) {
                    this.gameOver = true;
                    this.showGameOver();
                }
            }

            showGameOver() {
                const gameOverBg = this.add.rectangle(400, 300, 400, 200, 0x000000, 0.8);
                const gameOverText = this.add.text(400, 250, 'GAME OVER', {
                    fontSize: '32px',
                    fill: '#ff0000'
                }).setOrigin(0.5);

                const finalScoreText = this.add.text(400, 300, 'Final Score: ' + this.score, {
                    fontSize: '20px',
                    fill: '#ffffff'
                }).setOrigin(0.5);

                const restartText = this.add.text(400, 350, 'Press R to Restart', {
                    fontSize: '16px',
                    fill: '#00ff00'
                }).setOrigin(0.5);

                this.input.keyboard.once('keydown-R', () => {
                    this.scene.restart();
                });
            }
        }

        // Game configuration
        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 600,
            parent: 'game-container',
            backgroundColor: '#000011',
            physics: {
                default: 'arcade',
                arcade: {
                    gravity: { y: 0 },
                    debug: false
                }
            },
            scene: GameScene
        };

        // Start the game
        const game = new Phaser.Game(config);
    </script>
</body>
</html>
