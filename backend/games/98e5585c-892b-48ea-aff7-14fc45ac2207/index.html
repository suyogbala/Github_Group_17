<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar Scavenger</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        canvas {
            border: 1px solid #333;
        }
    </style>
</head>
<body>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.min.js"></script>
    <script>
        class GameScene extends Phaser.Scene {
            constructor() {
                super({ key: 'GameScene' });
                this.player = null;
                this.asteroids = null;
                this.enemies = null;
                this.scrap = null;
                this.lasers = null;
                this.enemyLasers = null;
                this.cursors = null;
                this.wasd = null;
                this.spaceKey = null;
                this.score = 0;
                this.scrapCount = 0;
                this.health = 3;
                this.wave = 1;
                this.waveTimer = 0;
                this.lastFired = 0;
                this.fireRate = 250;
                this.gameOver = false;
                this.upgradeScreen = false;
                this.upgrades = {
                    fireRate: 1,
                    damage: 1,
                    health: 1,
                    speed: 1
                };
            }

            create() {
                // Create scrolling background
                this.bg = this.add.tileSprite(400, 300, 800, 600, null);
                
                // Create groups
                this.asteroids = this.physics.add.group();
                this.enemies = this.physics.add.group();
                this.scrap = this.physics.add.group();
                this.lasers = this.physics.add.group();
                this.enemyLasers = this.physics.add.group();

                // Create player
                this.player = this.physics.add.rectangle(400, 500, 20, 30, 0x00ff00);
                this.player.setCollideWorldBounds(true);

                // Input
                this.cursors = this.input.keyboard.createCursorKeys();
                this.wasd = this.input.keyboard.addKeys('W,S,A,D');
                this.spaceKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);

                // UI
                this.scoreText = this.add.text(16, 16, 'Score: 0', { fontSize: '20px', fill: '#fff' });
                this.scrapText = this.add.text(16, 50, 'Scrap: 0', { fontSize: '20px', fill: '#fff' });
                this.healthText = this.add.text(16, 84, 'Health: 3', { fontSize: '20px', fill: '#fff' });
                this.waveText = this.add.text(600, 16, 'Wave: 1', { fontSize: '20px', fill: '#fff' });

                // Collisions
                this.physics.add.collider(this.player, this.asteroids, this.hitPlayer, null, this);
                this.physics.add.collider(this.player, this.enemies, this.hitPlayer, null, this);
                this.physics.add.collider(this.player, this.enemyLasers, this.hitPlayer, null, this);
                this.physics.add.overlap(this.player, this.scrap, this.collectScrap, null, this);
                this.physics.add.collider(this.lasers, this.asteroids, this.destroyAsteroid, null, this);
                this.physics.add.collider(this.lasers, this.enemies, this.destroyEnemy, null, this);

                // Start spawning
                this.time.addEvent({
                    delay: 1000,
                    callback: this.spawnAsteroid,
                    callbackScope: this,
                    loop: true
                });

                this.time.addEvent({
                    delay: 2000,
                    callback: this.spawnEnemy,
                    callbackScope: this,
                    loop: true
                });

                this.time.addEvent({
                    delay: 1500,
                    callback: this.spawnScrap,
                    callbackScope: this,
                    loop: true
                });
            }

            update(time) {
                if (this.gameOver) return;

                // Background scrolling
                if (this.bg) {
                    this.bg.tilePositionY -= 2;
                }

                // Player movement
                const speed = 300 + (this.upgrades.speed * 50);
                if (this.cursors.left.isDown || this.wasd.A.isDown) {
                    this.player.setVelocityX(-speed);
                } else if (this.cursors.right.isDown || this.wasd.D.isDown) {
                    this.player.setVelocityX(speed);
                } else {
                    this.player.setVelocityX(0);
                }

                // Shooting
                if (this.spaceKey.isDown && time > this.lastFired + (this.fireRate / this.upgrades.fireRate)) {
                    this.fireLaser();
                    this.lastFired = time;
                }

                // Move enemy lasers
                this.enemyLasers.children.entries.forEach(laser => {
                    if (laser.y > 600) laser.destroy();
                });

                // Clean up off-screen objects
                this.asteroids.children.entries.forEach(asteroid => {
                    if (asteroid.y > 650) asteroid.destroy();
                });

                this.enemies.children.entries.forEach(enemy => {
                    if (enemy.y > 650) enemy.destroy();
                });

                this.scrap.children.entries.forEach(scrapItem => {
                    if (scrapItem.y > 650) scrapItem.destroy();
                });

                this.lasers.children.entries.forEach(laser => {
                    if (laser.y < -50) laser.destroy();
                });

                // Wave progression
                this.waveTimer += 16.67;
                if (this.waveTimer > 30000) {
                    this.nextWave();
                }
            }

            fireLaser() {
                const laser = this.physics.add.rectangle(this.player.x, this.player.y - 20, 4, 15, 0xffff00);
                laser.setVelocityY(-500);
                this.lasers.add(laser);
            }

            spawnAsteroid() {
                if (this.gameOver) return;
                const x = Phaser.Math.Between(50, 750);
                const size = Phaser.Math.Between(20, 40);
                const asteroid = this.physics.add.rectangle(x, -50, size, size, 0x888888);
                asteroid.setVelocityY(Phaser.Math.Between(100, 200 + this.wave * 20));
                this.asteroids.add(asteroid);
            }

            spawnEnemy() {
                if (this.gameOver) return;
                const x = Phaser.Math.Between(50, 750);
                const enemy = this.physics.add.rectangle(x, -50, 25, 25, 0xff0000);
                enemy.setVelocityY(Phaser.Math.Between(80, 150 + this.wave * 10));
                this.enemies.add(enemy);

                // Enemy shooting
                this.time.addEvent({
                    delay: Phaser.Math.Between(1000, 3000),
                    callback: () => {
                        if (enemy.active && enemy.y < 500) {
                            const enemyLaser = this.physics.add.rectangle(enemy.x, enemy.y + 15, 4, 10, 0xff4444);
                            enemyLaser.setVelocityY(300);
                            this.enemyLasers.add(enemyLaser);
                        }
                    },
                    callbackScope: this
                });
            }

            spawnScrap() {
                if (this.gameOver) return;
                const x = Phaser.Math.Between(50, 750);
                const scrapItem = this.physics.add.rectangle(x, -50, 15, 15, 0x00ffff);
                scrapItem.setVelocityY(Phaser.Math.Between(100, 180));
                this.scrap.add(scrapItem);
            }

            hitPlayer(player, object) {
                object.destroy();
                this.health--;
                this.healthText.setText('Health: ' + this.health);
                
                // Flash effect
                this.player.setTint(0xff0000);
                this.time.delayedCall(200, () => {
                    if (this.player.active) this.player.clearTint();
                });

                if (this.health <= 0) {
                    this.endGame();
                }
            }

            collectScrap(player, scrapItem) {
                scrapItem.destroy();
                this.scrapCount++;
                this.score += 10;
                this.scoreText.setText('Score: ' + this.score);
                this.scrapText.setText('Scrap: ' + this.scrapCount);
            }

            destroyAsteroid(laser, asteroid) {
                laser.destroy();
                asteroid.destroy();
                this.score += 5;
                this.scoreText.setText('Score: ' + this.score);
            }

            destroyEnemy(laser, enemy) {
                laser.destroy();
                enemy.destroy();
                this.score += 20;
                this.scoreText.setText('Score: ' + this.score);
            }

            nextWave() {
                this.wave++;
                this.waveTimer = 0;
                this.waveText.setText('Wave: ' + this.wave);
                this.showUpgradeScreen();
            }

            showUpgradeScreen() {
                this.physics.pause();
                const bg = this.add.rectangle(400, 300, 600, 400, 0x000000, 0.8);
                const title = this.add.text(400, 150, 'WAVE ' + this.wave + ' - UPGRADES', { 
                    fontSize: '24px', fill: '#fff', align: 'center' 
                }).setOrigin(0.5);

                const upgradeText = this.add.text(400, 200, 'Scrap Available: ' + this.scrapCount, { 
                    fontSize: '18px', fill: '#ffff00', align: 'center' 
                }).setOrigin(0.5);

                // Upgrade buttons
                const upgrades = [
                    { name: 'Fire Rate', cost: 5, key: 'fireRate' },
                    { name: 'Damage', cost: 8, key: 'damage' },
                    { name: 'Health', cost: 10, key: 'health' },
                    { name: 'Speed', cost: 6, key: 'speed' }
                ];

                upgrades.forEach((upgrade, index) => {
                    const y = 250 + index * 40;
                    const canAfford = this.scrapCount >= upgrade.cost;
                    const color = canAfford ? '#00ff00' : '#ff0000';
                    
                    const btn = this.add.text(400, y, `${upgrade.name} (${upgrade.cost} scrap)`, {
                        fontSize: '16px', fill: color, align: 'center'
                    }).setOrigin(0.5);
                    
                    if (canAfford) {
                        btn.setInteractive({ useHandCursor: true });
                        btn.on('pointerdown', () => {
                            this.scrapCount -= upgrade.cost;
                            this.upgrades[upgrade.key]++;
                            if (upgrade.key === 'health') {
                                this.health++;
                                this.healthText.setText('Health: ' + this.health);
                            }
                            this.scrapText.setText('Scrap: ' + this.scrapCount);
                            this.closeUpgradeScreen(bg, title, upgradeText, btn);
                        });
                    }
                });

                const continueBtn = this.add.text(400, 420, 'CONTINUE', {
                    fontSize: '20px', fill: '#ffffff', align: 'center'
                }).setOrigin(0.5);
                
                continueBtn.setInteractive({ useHandCursor: true });
                continueBtn.on('pointerdown', () => {
                    this.closeUpgradeScreen(bg, title, upgradeText, continueBtn);
                });
            }

            closeUpgradeScreen(...elements) {
                elements.forEach(element => {
                    if (element && element.destroy) element.destroy();
                });
                this.physics.resume();
            }

            endGame() {
                this.gameOver = true;
                this.physics.pause();
                
                const bg = this.add.rectangle(400, 300, 600, 400, 0x000000, 0.9);
                this.add.text(400, 200, 'GAME OVER', { 
                    fontSize: '32px', fill: '#ff0000', align: 'center' 
                }).setOrigin(0.5);
                
                this.add.text(400, 250, 'Final Score: ' + this.score, { 
                    fontSize: '24px', fill: '#fff', align: 'center' 
                }).setOrigin(0.5);
                
                this.add.text(400, 300, 'Waves Survived: ' + this.wave, { 
                    fontSize: '20px', fill: '#fff', align: 'center' 
                }).setOrigin(0.5);

                const restartBtn = this.add.text(400, 370, 'RESTART', {
                    fontSize: '24px', fill: '#00ff00', align: 'center'
                }).setOrigin(0.5);
                
                restartBtn.setInteractive({ useHandCursor: true });
                restartBtn.on('pointerdown', () => {
                    this.scene.restart();
                });
            }
        }

        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 600,
            backgroundColor: '#001122',
            physics: {
                default: 'arcade',
                arcade: {
                    gravity: { y: 0 },
                    debug: false
                }
            },
            scene: GameScene
        };

        const game = new Phaser.Game(config);
    </script>
</body>
</html>
