<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Galaxy Defender</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(45deg, #1a1a2e, #16213e);
            font-family: 'Courier New', monospace;
        }
        #game-container {
            border: 2px solid #00ffff;
            box-shadow: 0 0 20px #00ffff;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    
    <script>
        class GameScene extends Phaser.Scene {
            constructor() {
                super({ key: 'GameScene' });
                this.player = null;
                this.enemies = null;
                this.playerBullets = null;
                this.enemyBullets = null;
                this.cursors = null;
                this.score = 0;
                this.lives = 3;
                this.scoreText = null;
                this.livesText = null;
                this.shootTimer = 0;
                this.shootDelay = 300;
                this.enemySpawnTimer = 0;
                this.enemySpawnDelay = 1000;
            }

            preload() {
                // Create simple colored rectangles for game assets
                this.add.graphics()
                    .fillStyle(0x00ffff)
                    .fillRect(0, 0, 20, 30)
                    .generateTexture('player', 20, 30);

                this.add.graphics()
                    .fillStyle(0xff4444)
                    .fillRect(0, 0, 16, 16)
                    .generateTexture('enemy', 16, 16);

                this.add.graphics()
                    .fillStyle(0xffff00)
                    .fillRect(0, 0, 4, 10)
                    .generateTexture('playerBullet', 4, 10);

                this.add.graphics()
                    .fillStyle(0xff0000)
                    .fillRect(0, 0, 4, 10)
                    .generateTexture('enemyBullet', 4, 10);

                this.add.graphics()
                    .fillStyle(0xffffff)
                    .fillRect(0, 0, 2, 2)
                    .generateTexture('star', 2, 2);
            }

            create() {
                // Create scrolling star background
                this.stars = [];
                for (let i = 0; i < 50; i++) {
                    const star = this.add.image(
                        Phaser.Math.Between(0, 800),
                        Phaser.Math.Between(0, 600),
                        'star'
                    );
                    star.alpha = Math.random() * 0.8 + 0.2;
                    star.speed = Math.random() * 2 + 1;
                    this.stars.push(star);
                }

                // Create player
                this.player = this.physics.add.sprite(400, 550, 'player');
                this.player.setCollideWorldBounds(true);

                // Create groups
                this.enemies = this.physics.add.group();
                this.playerBullets = this.physics.add.group();
                this.enemyBullets = this.physics.add.group();

                // Controls
                this.cursors = this.input.keyboard.createCursorKeys();
                this.spaceKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);

                // UI
                this.scoreText = this.add.text(16, 16, 'Score: 0', {
                    fontSize: '24px',
                    fill: '#00ffff',
                    fontFamily: 'Courier New'
                });
                
                this.livesText = this.add.text(16, 50, 'Lives: 3', {
                    fontSize: '24px',
                    fill: '#ff00ff',
                    fontFamily: 'Courier New'
                });

                // Collisions
                this.physics.add.overlap(this.playerBullets, this.enemies, this.hitEnemy, null, this);
                this.physics.add.overlap(this.player, this.enemies, this.hitPlayer, null, this);
                this.physics.add.overlap(this.player, this.enemyBullets, this.hitPlayer, null, this);

                // Spawn first enemies
                this.spawnEnemies();
            }

            update(time, delta) {
                // Update background stars
                this.stars.forEach(star => {
                    star.y += star.speed;
                    if (star.y > 610) {
                        star.y = -10;
                        star.x = Phaser.Math.Between(0, 800);
                    }
                });

                // Player movement
                if (this.cursors.left.isDown) {
                    this.player.setVelocityX(-300);
                } else if (this.cursors.right.isDown) {
                    this.player.setVelocityX(300);
                } else {
                    this.player.setVelocityX(0);
                }

                if (this.cursors.up.isDown) {
                    this.player.setVelocityY(-300);
                } else if (this.cursors.down.isDown) {
                    this.player.setVelocityY(300);
                } else {
                    this.player.setVelocityY(0);
                }

                // Player shooting
                this.shootTimer += delta;
                if (this.spaceKey.isDown && this.shootTimer >= this.shootDelay) {
                    this.shootPlayerBullet();
                    this.shootTimer = 0;
                }

                // Update bullets
                this.playerBullets.children.entries.forEach(bullet => {
                    if (bullet.y < -10) {
                        bullet.destroy();
                    }
                });

                this.enemyBullets.children.entries.forEach(bullet => {
                    if (bullet.y > 610) {
                        bullet.destroy();
                    }
                });

                // Update enemies
                this.enemies.children.entries.forEach(enemy => {
                    if (enemy.y > 610) {
                        enemy.destroy();
                    }
                    
                    // Enemy shooting
                    if (Math.random() < 0.005) {
                        this.shootEnemyBullet(enemy);
                    }
                });

                // Spawn enemies
                this.enemySpawnTimer += delta;
                if (this.enemySpawnTimer >= this.enemySpawnDelay) {
                    this.spawnEnemies();
                    this.enemySpawnTimer = 0;
                }
            }

            shootPlayerBullet() {
                const bullet = this.physics.add.sprite(this.player.x, this.player.y - 15, 'playerBullet');
                bullet.setVelocityY(-400);
                this.playerBullets.add(bullet);
            }

            shootEnemyBullet(enemy) {
                const bullet = this.physics.add.sprite(enemy.x, enemy.y + 15, 'enemyBullet');
                bullet.setVelocityY(200);
                this.enemyBullets.add(bullet);
            }

            spawnEnemies() {
                for (let i = 0; i < 3; i++) {
                    const x = Phaser.Math.Between(50, 750);
                    const enemy = this.physics.add.sprite(x, -20, 'enemy');
                    enemy.setVelocityY(100);
                    this.enemies.add(enemy);
                }
            }

            hitEnemy(bullet, enemy) {
                bullet.destroy();
                enemy.destroy();
                this.score += 10;
                this.scoreText.setText('Score: ' + this.score);
            }

            hitPlayer(player, object) {
                object.destroy();
                this.lives--;
                this.livesText.setText('Lives: ' + this.lives);
                
                if (this.lives <= 0) {
                    this.scene.start('GameOverScene', { score: this.score });
                }
            }
        }

        class GameOverScene extends Phaser.Scene {
            constructor() {
                super({ key: 'GameOverScene' });
            }

            init(data) {
                this.finalScore = data.score || 0;
            }

            create() {
                const centerX = 400;
                const centerY = 300;

                this.add.text(centerX, centerY - 100, 'GAME OVER', {
                    fontSize: '48px',
                    fill: '#ff0000',
                    fontFamily: 'Courier New'
                }).setOrigin(0.5);

                this.add.text(centerX, centerY - 20, `Final Score: ${this.finalScore}`, {
                    fontSize: '24px',
                    fill: '#00ffff',
                    fontFamily: 'Courier New'
                }).setOrigin(0.5);

                this.add.text(centerX, centerY + 40, 'Press SPACE to restart', {
                    fontSize: '20px',
                    fill: '#ffff00',
                    fontFamily: 'Courier New'
                }).setOrigin(0.5);

                const spaceKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
                spaceKey.on('down', () => {
                    this.scene.start('GameScene');
                });

                this.input.on('pointerdown', () => {
                    this.scene.start('GameScene');
                });
            }
        }

        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 600,
            parent: 'game-container',
            backgroundColor: '#000033',
            physics: {
                default: 'arcade',
                arcade: {
                    gravity: { y: 0 },
                    debug: false
                }
            },
            scene: [GameScene, GameOverScene]
        };

        const game = new Phaser.Game(config);
    </script>
</body>
</html>
