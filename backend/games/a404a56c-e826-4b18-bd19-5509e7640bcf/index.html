<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Courier</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #000;
            font-family: 'Courier New', monospace;
        }
        canvas {
            border: 2px solid #444;
        }
    </style>
</head>
<body>
    <script>
        class CosmicCourierGame extends Phaser.Scene {
            constructor() {
                super({ key: 'CosmicCourierGame' });
                this.player = null;
                this.enemies = null;
                this.bullets = null;
                this.enemyBullets = null;
                this.asteroids = null;
                this.packages = null;
                this.stations = null;
                this.pickups = null;
                this.particles = null;
                
                this.cursors = null;
                this.keys = null;
                this.lastFired = 0;
                this.fireRate = 200;
                
                this.health = 100;
                this.maxHealth = 100;
                this.fuel = 100;
                this.maxFuel = 100;
                this.credits = 0;
                this.score = 0;
                this.packagesDelivered = 0;
                this.totalPackages = 5;
                
                this.gameState = 'playing'; // playing, upgrading, gameOver
                this.currentTarget = null;
                this.deliveryRoute = [];
                
                this.upgradeWeapon = 1;
                this.upgradeShield = 1;
                this.upgradeEngine = 1;
                this.upgradeFuel = 1;
                
                this.sounds = {};
            }
            
            preload() {
                // Create all graphics programmatically
                this.createPlayerTexture();
                this.createEnemyTextures();
                this.createBulletTextures();
                this.createAsteroidTextures();
                this.createPackageTexture();
                this.createStationTexture();
                this.createPickupTextures();
                this.createStarField();
                
                // Create sounds programmatically
                this.createSounds();
            }
            
            create() {
                // Add starfield background
                this.add.image(400, 300, 'starfield');
                
                // Initialize physics groups
                this.bullets = this.physics.add.group({
                    classType: Phaser.Physics.Arcade.Sprite,
                    maxSize: 20,
                    runChildUpdate: true
                });
                
                this.enemyBullets = this.physics.add.group({
                    classType: Phaser.Physics.Arcade.Sprite,
                    maxSize: 30,
                    runChildUpdate: true
                });
                
                this.enemies = this.physics.add.group();
                this.asteroids = this.physics.add.group();
                this.packages = this.physics.add.group();
                this.stations = this.physics.add.group();
                this.pickups = this.physics.add.group();
                
                // Create player
                this.player = this.physics.add.sprite(100, 300, 'player');
                this.player.setCollideWorldBounds(true);
                this.player.setDamping(true);
                this.player.setDrag(0.99);
                this.player.setMaxVelocity(300);
                this.player.setAngularDrag(100);
                
                // Create initial game objects
                this.generateDeliveryRoute();
                this.spawnAsteroids();
                this.spawnEnemies();
                
                // Setup controls
                this.cursors = this.input.keyboard.createCursorKeys();
                this.keys = this.input.keyboard.addKeys('W,S,A,D,SPACE,R');
                
                // Setup collisions
                this.setupCollisions();
                
                // Create UI
                this.createUI();
                
                // Setup timers
                this.time.addEvent({
                    delay: 3000,
                    callback: this.spawnEnemy,
                    callbackScope: this,
                    loop: true
                });
                
                this.time.addEvent({
                    delay: 1000,
                    callback: this.consumeFuel,
                    callbackScope: this,
                    loop: true
                });
            }
            
            update(time, delta) {
                if (this.gameState === 'playing') {
                    this.handleInput(time);
                    this.updateEnemies();
                    this.updateUI();
                    this.checkGameConditions();
                }
            }
            
            createPlayerTexture() {
                const graphics = this.add.graphics();
                graphics.fillStyle(0x00ff00);
                graphics.fillTriangle(0, -15, -10, 10, 10, 10);
                graphics.fillStyle(0x0088ff);
                graphics.fillCircle(0, 0, 3);
                graphics.generateTexture('player', 20, 25);
                graphics.destroy();
            }
            
            createEnemyTextures() {
                // Enemy type 1
                const graphics1 = this.add.graphics();
                graphics1.fillStyle(0xff0000);
                graphics1.fillTriangle(0, -12, -8, 8, 8, 8);
                graphics1.fillStyle(0xff4444);
                graphics1.fillCircle(0, -2, 2);
                graphics1.generateTexture('enemy1', 16, 20);
                graphics1.destroy();
                
                // Enemy type 2
                const graphics2 = this.add.graphics();
                graphics2.fillStyle(0xff8800);
                graphics2.fillRect(-6, -6, 12, 12);
                graphics2.fillStyle(0xffaa44);
                graphics2.fillCircle(0, 0, 3);
                graphics2.generateTexture('enemy2', 12, 12);
                graphics2.destroy();
            }
            
            createBulletTextures() {
                // Player bullet
                const graphics1 = this.add.graphics();
                graphics1.fillStyle(0x00ffff);
                graphics1.fillCircle(0, 0, 2);
                graphics1.generateTexture('bullet', 4, 4);
                graphics1.destroy();
                
                // Enemy bullet
                const graphics2 = this.add.graphics();
                graphics2.fillStyle(0xff0000);
                graphics2.fillCircle(0, 0, 3);
                graphics2.generateTexture('enemyBullet', 6, 6);
                graphics2.destroy();
            }
            
            createAsteroidTextures() {
                const graphics = this.add.graphics();
                graphics.fillStyle(0x888888);
                const points = [];
                for (let i = 0; i < 8; i++) {
                    const angle = (i / 8) * Math.PI * 2;
                    const radius = 15 + Math.random() * 10;
                    points.push(Math.cos(angle) * radius, Math.sin(angle) * radius);
                }
                graphics.fillPoints(points, true);
                graphics.generateTexture('asteroid', 50, 50);
                graphics.destroy();
            }
            
            createPackageTexture() {
                const graphics = this.add.graphics();
                graphics.fillStyle(0xffff00);
                graphics.fillRect(-5, -5, 10, 10);
                graphics.lineStyle(2, 0x000000);
                graphics.strokeRect(-5, -5, 10, 10);
                graphics.generateTexture('package', 10, 10);
                graphics.destroy();
            }
            
            createStationTexture() {
                const graphics = this.add.graphics();
                graphics.fillStyle(0x0088ff);
                graphics.fillCircle(0, 0, 20);
                graphics.fillStyle(0x004488);
                graphics.fillCircle(0, 0, 15);
                graphics.fillStyle(0x00aaff);
                graphics.fillCircle(0, 0, 10);
                graphics.generateTexture('station', 40, 40);
                graphics.destroy();
            }
            
            createPickupTextures() {
                // Health pickup
                const graphics1 = this.add.graphics();
                graphics1.fillStyle(0x00ff00);
                graphics1.fillRect(-3, -8, 6, 16);
                graphics1.fillRect(-8, -3, 16, 6);
                graphics1.generateTexture('healthPickup', 16, 16);
                graphics1.destroy();
                
                // Fuel pickup
                const graphics2 = this.add.graphics();
                graphics2.fillStyle(0xffaa00);
                graphics2.fillCircle(0, 0, 6);
                graphics2.fillStyle(0xff6600);
                graphics2.fillCircle(0, 0, 3);
                graphics2.generateTexture('fuelPickup', 12, 12);
                graphics2.destroy();
                
                // Credit pickup
                const graphics3 = this.add.graphics();
                graphics3.fillStyle(0xffff00);
                const starPoints = [];
                for (let i = 0; i < 10; i++) {
                    const angle = (i / 10) * Math.PI * 2;
                    const radius = i % 2 === 0 ? 8 : 4;
                    starPoints.push(Math.cos(angle) * radius, Math.sin(angle) * radius);
                }
                graphics3.fillPoints(starPoints, true);
                graphics3.generateTexture('creditPickup', 16, 16);
                graphics3.destroy();
            }
            
            createStarField() {
                const graphics = this.add.graphics();
                graphics.fillStyle(0x000011);
                graphics.fillRect(0, 0, 800, 600);
                
                for (let i = 0; i < 100; i++) {
                    const x = Math.random() * 800;
                    const y = Math.random() * 600;
                    const brightness = Math.random();
                    graphics.fillStyle(Phaser.Display.Color.GetColor(
                        Math.floor(brightness * 255),
                        Math.floor(brightness * 255),
                        255
                    ));
                    graphics.fillCircle(x, y, Math.random() * 2);
                }
                
                graphics.generateTexture('starfield', 800, 600);
                graphics.destroy();
            }
            
            createSounds() {
                // Create Web Audio context sounds
                this.sounds.shoot = this.createTone(800, 0.1);
                this.sounds.explosion = this.createNoise(0.3);
                this.sounds.pickup = this.createTone(1200, 0.2);
                this.sounds.damage = this.createTone(200, 0.4);
            }
            
            createTone(frequency, duration) {
                return () => {
                    if (this.sound.context) {
                        const oscillator = this.sound.context.createOscillator();
                        const gainNode = this.sound.context.createGain();
                        
                        oscillator.connect(gainNode);
                        gainNode.connect(this.sound.context.destination);
                        
                        oscillator.frequency.value = frequency;
                        oscillator.type = 'square';
                        
                        gainNode.gain.setValueAtTime(0.1, this.sound.context.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.001, this.sound.context.currentTime + duration);
                        
                        oscillator.start(this.sound.context.currentTime);
                        oscillator.stop(this.sound.context.currentTime + duration);
                    }
                };
            }
            
            createNoise(duration) {
                return () => {
                    if (this.sound.context) {
                        const bufferSize = this.sound.context.sampleRate * duration;
                        const buffer = this.sound.context.createBuffer(1, bufferSize, this.sound.context.sampleRate);
                        const data = buffer.getChannelData(0);
                        
                        for (let i = 0; i < bufferSize; i++) {
                            data[i] = Math.random() * 2 - 1;
                        }
                        
                        const source = this.sound.context.createBufferSource();
                        const gainNode = this.sound.context.createGain();
                        
                        source.buffer = buffer;
                        source.connect(gainNode);
                        gainNode.connect(this.sound.context.destination);
                        
                        gainNode.gain.setValueAtTime(0.1, this.sound.context.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.001, this.sound.context.currentTime + duration);
                        
                        source.start(this.sound.context.currentTime);
                    }
                };
            }
            
            generateDeliveryRoute() {
                this.deliveryRoute = [];
                
                for (let i = 0; i < this.totalPackages; i++) {
                    const stationX = 200 + (i * 120) + Math.random() * 60;
                    const stationY = 150 + Math.random() * 300;
                    
                    const station = this.physics.add.sprite(stationX, stationY, 'station');
                    station.setImmovable(true);
                    this.stations.add(station);
                    
                    const packageX = 100 + Math.random() * 100;
                    const packageY = 100 + Math.random() * 400;
                    
                    const pkg = this.physics.add.sprite(packageX, packageY, 'package');
                    pkg.setImmovable(true);
                    pkg.targetStation = station;
                    this.packages.add(pkg);
                    
                    this.deliveryRoute.push({ package: pkg, station: station });
                }
                
                this.currentTarget = this.deliveryRoute[0].package;
            }
            
            spawnAsteroids() {
                for (let i = 0; i < 15; i++) {
                    const x = Math.random() * 800;
                    const y = Math.random() * 600;
                    
                    if (Phaser.Math.Distance.Between(x, y, this.player.x, this.player.y) > 100) {
                        const asteroid = this.physics.add.sprite(x, y, 'asteroid');
                        asteroid.setVelocity(
                            (Math.random() - 0.5) * 100,
                            (Math.random() - 0.5) * 100
                        );
                        asteroid.setAngularVelocity((Math.random() - 0.5) * 100);
                        asteroid.setCollideWorldBounds(true);
                        asteroid.setBounce(1);
                        this.asteroids.add(asteroid);
                    }
                }
            }
            
            spawnEnemies() {
                for (let i = 0; i < 5; i++) {
                    this.spawnEnemy();
                }
            }
            
            spawnEnemy() {
                const side = Math.floor(Math.random() * 4);
                let x, y;
                
                switch (side) {
                    case 0: x = -50; y = Math.random() * 600; break;
                    case 1: x = 850; y = Math.random() * 600; break;
                    case 2: x = Math.random() * 800; y = -50; break;
                    case 3: x = Math.random() * 800; y = 650; break;
                }
                
                const enemyType = Math.random() < 0.5 ? 'enemy1' : 'enemy2';
                const enemy = this.physics.add.sprite(x, y, enemyType);
                enemy.setCollideWorldBounds(true);
                enemy.setBounce(0.5);
                enemy.health = 2;
                enemy.lastFired = 0;
                enemy.enemyType = enemyType;
                
                this.enemies.add(enemy);
            }
            
            handleInput(time) {
                const player = this.player;
                
                // Rotation
                if (this.cursors.left.isDown || this.keys.A.isDown) {
                    player.setAngularVelocity(-200 * this.upgradeEngine);
                } else if (this.cursors.right.isDown || this.keys.D.isDown) {
                    player.setAngularVelocity(200 * this.upgradeEngine);
                } else {
                    player.setAngularVelocity(0);
                }
                
                // Thrust
                if ((this.cursors.up.isDown || this.keys.W.isDown) && this.fuel > 0) {
                    this.physics.velocityFromRotation(
                        player.rotation,
                        200 * this.upgradeEngine,
                        player.body.acceleration
                    );
                    this.fuel -= 0.5;
                } else {
                    player.setAcceleration(0);
                }
                
                // Shooting
                if ((this.cursors.space.isDown || this.keys.SPACE.isDown) && time > this.lastFired) {
                    this.fireBullet();
                    this.lastFired = time + (this.fireRate / this.upgradeWeapon);
                }
                
                // Restart
                if (this.keys.R.isDown && this.gameState === 'gameOver') {
                    this.restartGame();
                }
            }
            
            fireBullet() {
                const bullet = this.bullets.get();
                
                if (bullet) {
                    bullet.setTexture('bullet');
                    bullet.setPosition(this.player.x, this.player.y);
                    bullet.setRotation(this.player.rotation);
                    bullet.setActive(true);
                    bullet.setVisible(true);
                    
                    this.physics.velocityFromRotation(
                        this.player.rotation,
                        400,
                        bullet.body.velocity
                    );
                    
                    bullet.body.velocity.x += this.player.body.velocity.x;
                    bullet.body.velocity.y += this.player.body.velocity.y;
                    
                    this.sounds.shoot();
                    
                    bullet.update = function() {
                        if (this.x < -50 || this.x > 850 || this.y < -50 || this.y > 650) {
                            this.setActive(false);
                            this.setVisible(false);
                        }
                    };
                }
            }
            
            fireEnemyBullet(enemy) {
                const bullet = this.enemyBullets.get();
                
                if (bullet) {
                    bullet.setTexture('enemyBullet');
                    bullet.setPosition(enemy.x, enemy.y);
                    bullet.setActive(true);
                    bullet.setVisible(true);
                    
                    const angle = Phaser.Math.Angle.Between(
                        enemy.x, enemy.y,
                        this.player.x, this.player.y
                    );
                    
                    this.physics.velocityFromRotation(angle, 300, bullet.body.velocity);
                    
                    bullet.update = function() {
                        if (this.x < -50 || this.x > 850 || this.y < -50 || this.y > 650) {
                            this.setActive(false);
                            this.setVisible(false);
                        }
                    };
                }
            }
            
            updateEnemies() {
                this.enemies.children.entries.forEach(enemy => {
                    if (!enemy.active) return;
                    
                    // Move towards player
                    const angle = Phaser.Math.Angle.Between(
                        enemy.x, enemy.y,
                        this.player.x, this.player.y
                    );
                    
                    enemy.setRotation(angle);
                    this.physics.velocityFromRotation(angle, 100, enemy.body.velocity);
                    
                    // Fire at player
                    const distance = Phaser.Math.Distance.Between(
                        enemy.x, enemy.y,
                        this.player.x, this.player.y
                    );
                    
                    if (distance < 300 && this.time.now > enemy.lastFired + 1000) {
                        this.fireEnemyBullet(enemy);
                        enemy.lastFired = this.time.now;
                    }
                });
            }
            
            setupCollisions() {
                // Player bullets vs enemies
                this.physics.add.overlap(this.bullets, this.enemies, (bullet, enemy) => {
                    this.hitEnemy(bullet, enemy);
                });
                
                // Player bullets vs asteroids
                this.physics.add.overlap(this.bullets, this.asteroids, (bullet, asteroid) => {
                    this.hitAsteroid(bullet, asteroid);
                });
                
                // Enemy bullets vs player
                this.physics.add.overlap(this.enemyBullets, this.player, (bullet, player) => {
                    this.hitPlayer(bullet);
                });
                
                // Player vs enemies
                this.physics.add.overlap(this.player, this.enemies, (player, enemy) => {
                    this.hitPlayer(null, 20);
                    this.destroyEnemy(enemy);
                });
                
                // Player vs asteroids
                this.physics.add.overlap(this.player, this.asteroids, (player, asteroid) => {
                    this.hitPlayer(null, 10);
                });
                
                // Player vs packages
                this.physics.add.overlap(this.player, this.packages, (player, pkg) => {
                    this.collectPackage(pkg);
                });
                
                // Player vs stations
                this.physics.add.overlap(this.player, this.stations, (player, station) => {
                    this.visitStation(station);
                });
                
                // Player vs pickups
                this.physics.add.overlap(this.player, this.pickups, (player, pickup) => {
                    this.collectPickup(pickup);
                });
            }
            
            hitEnemy(bullet, enemy) {
                bullet.setActive(false);
                bullet.setVisible(false);
                
                enemy.health--;
                
                if (enemy.health <= 0) {
                    this.destroyEnemy(enemy);
                    this.score += 100;
                    this.spawnPickup(enemy.x, enemy.y);
                }
                
                this.sounds.explosion();
                this.createExplosion(enemy.x, enemy.y);
            }
            
            hitAsteroid(bullet, asteroid) {
                bullet.setActive(false);
                bullet.setVisible(false);
                
                this.sounds.explosion();
                this.createExplosion(asteroid.x, asteroid.y);
                this.spawnPickup(asteroid.x, asteroid.y);
                
                asteroid.destroy();
            }
            
            hitPlayer(bullet, damage = 10) {
                if (bullet) {
                    bullet.setActive(false);
                    bullet.setVisible(false);
                }
                
                this.health -= damage / this.upgradeShield;
                this.sounds.damage();
                this.cameras.main.shake(100, 0.02);
                
                if (this.health <= 0) {
                    this.gameOver();
                }
            }
            
            destroyEnemy(enemy) {
                this.createExplosion(enemy.x, enemy.y);
                enemy.destroy();
            }
            
            collectPackage(pkg) {
                this.currentTarget = pkg.targetStation;
                pkg.destroy();
                this.sounds.pickup();
                this.score += 500;
            }
            
            visitStation(station) {
                if (this.currentTarget === station) {
                    this.packagesDelivered++;
                    this.score += 1000;
                    this.credits += 100;
                    station.destroy();
                    this.sounds.pickup();
                    
                    // Find next package
                    const nextDelivery = this.deliveryRoute.find(d => 
                        d.package && d.package.active && d.station && d.station.active
                    );
                    
                    if (nextDelivery) {
                        this.currentTarget = nextDelivery.package;
                    } else if (this.packagesDelivered >= this.totalPackages) {
                        this.winGame();
                    }
                    
                    // Refuel at station
                    this.fuel = Math.min(this.fuel + 50, this.maxFuel * this.upgradeFuel);
                    this.health = Math.min(this.health + 25, this.maxHealth * this.upgradeShield);
                }
            }
            
            collectPickup(pickup) {
                const type = pickup.texture.key;
                
                switch (type) {
                    case 'healthPickup':
                        this.health = Math.min(this.health + 25, this.maxHealth * this.upgradeShield);
                        break;
                    case 'fuelPickup':
                        this.fuel = Math.min(this.fuel + 30, this.maxFuel * this.upgradeFuel);
                        break;
                    case 'creditPickup':
                        this.credits += 50;
                        this.score += 50;
                        break;
                }
                
                pickup.destroy();
                this.sounds.pickup();
            }
            
            spawnPickup(x, y) {
                if (Math.random() < 0.3) {
                    const types = ['healthPickup', 'fuelPickup', 'creditPickup'];
                    const type = types[Math.floor(Math.random() * types.length)];
                    
                    const pickup = this.physics.add.sprite(x, y, type);
                    pickup.setVelocity(
                        (Math.random() - 0.5) * 100,
                        (Math.random() - 0.5) * 100
                    );
                    pickup.setCollideWorldBounds(true);
                    pickup.setBounce(0.5);
                    
                    this.pickups.add(pickup);
                    
                    // Auto-destroy after 10 seconds
                    this.time.delayedCall(10000, () => {
                        if (pickup.active) pickup.destroy();
                    });
                }
            }
            
            createExplosion(x, y) {
                const graphics = this.add.graphics();
                graphics.x = x;
                graphics.y = y;
                
                const colors = [0xff0000, 0xff8800, 0xffff00];
                
                for (let i = 0; i < 8; i++) {
                    const angle = (i / 8) * Math.PI * 2;
                    const distance = Math.random() * 30;
                    const size = Math.random() * 5 + 2;
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    
                    graphics.fillStyle(color);
                    graphics.fillCircle(
                        Math.cos(angle) * distance,
                        Math.sin(angle) * distance,
                        size
                    );
                }
                
                this.tweens.add({
                    targets: graphics,
                    alpha: 0,
                    scaleX: 2,
                    scaleY: 2,
                    duration: 300,
                    onComplete: () => graphics.destroy()
                });
            }
            
            consumeFuel() {
                if (this.gameState === 'playing') {
                    this.fuel -= 1;
                    if (this.fuel <= 0) {
                        this.gameOver();
                    }
                }
            }
            
            createUI() {
                // Health bar
                this.healthBarBg = this.add.graphics();
                this.healthBarBg.fillStyle(0x660000);
                this.healthBarBg.fillRect(10, 10, 200, 20);
                
                this.healthBar = this.add.graphics();
                
                // Fuel bar
                this.fuelBarBg = this.add.graphics();
                this.fuelBarBg.fillStyle(0x664400);
                this.fuelBarBg.fillRect(10, 35, 200, 20);
                
                this.fuelBar = this.add.graphics();
                
                // Score text
                this.scoreText = this.add.text(10, 65, 'Score: 0', {
                    fontSize: '16px',
                    fill: '#ffffff'
                });
                
                // Credits text
                this.creditsText = this.add.text(10, 85, 'Credits: 0', {
                    fontSize: '16px',
                    fill: '#ffff00'
                });
                
                // Package progress
                this.packageText = this.add.text(10, 105, 'Packages: 0/5', {
                    fontSize: '16px',
                    fill: '#00ff00'
                });
                
                // Objective text
                this.objectiveText = this.add.text(400, 10, '', {
                    fontSize: '14px',
                    fill: '#00ffff',
                    align: 'center'
                });
            }
            
            updateUI() {
                // Update health bar
                this.healthBar.clear();
                this.healthBar.fillStyle(0x00ff00);
                const healthPercent = Math.max(0, this.health / (this.maxHealth * this.upgradeShield));
                this.healthBar.fillRect(10, 10, 200 * healthPercent, 20);
                
                // Update fuel bar
                this.fuelBar.clear();
                this.fuelBar.fillStyle(0xffaa00);
                const fuelPercent = Math.max(0, this.fuel / (this.maxFuel * this.upgradeFuel));
                this.fuelBar.fillRect(10, 35, 200 * fuelPercent, 20);
                
                // Update text
                this.scoreText.setText('Score: ' + this.score);
                this.creditsText.setText('Credits: ' + this.credits);
                this.packageText.setText('Packages: ' + this.packagesDelivered + '/' + this.totalPackages);
                
                // Update objective
                if (this.currentTarget) {
                    const distance = Math.floor(Phaser.Math.Distance.Between(
                        this.player.x, this.player.y,
                        this.currentTarget.x, this.currentTarget.y
                    ));
                    
                    const targetType = this.currentTarget.texture.key === 'package' ? 'Package' : 'Station';
                    this.objectiveText.setText('Target: ' + targetType + ' (' + distance + 'm)');
                }
            }
            
            checkGameConditions() {
                if (this.fuel <= 0 || this.health <= 0) {
                    this.gameOver();
                }
            }
            
            gameOver() {
                this.gameState = 'gameOver';
                
                const gameOverText = this.add.text(400, 250, 'GAME OVER', {
                    fontSize: '48px',
                    fill: '#ff0000',
                    align: 'center'
                }).setOrigin(0.5);
                
                const finalScoreText = this.add.text(400, 300, 'Final Score: ' + this.score, {
                    fontSize: '24px',
                    fill: '#ffffff',
                    align: 'center'
                }).setOrigin(0.5);
                
                const restartText = this.add.text(400, 350, 'Press R to Restart', {
                    fontSize: '20px',
                    fill: '#00ff00',
                    align: 'center'
                }).setOrigin(0.5);
                
                // Stop all movement
                this.physics.pause();
            }
            
            winGame() {
                this.gameState = 'gameOver';
                
                const winText = this.add.text(400, 250, 'MISSION COMPLETE!', {
                    fontSize: '48px',
                    fill: '#00ff00',
                    align: 'center'
                }).setOrigin(0.5);
                
                const bonusScore = this.packagesDelivered * 1000;
                this.score += bonusScore;
                
                const finalScoreText = this.add.text(400, 300, 'Final Score: ' + this.score, {
                    fontSize: '24px',
                    fill: '#ffffff',
                    align: 'center'
                }).setOrigin(0.5);
                
                const restartText = this.add.text(400, 350, 'Press R to Play Again', {
                    fontSize: '20px',
                    fill: '#00ff00',
                    align: 'center'
                }).setOrigin(0.5);
            }
            
            restartGame() {
                this.scene.restart();
            }
        }
        
        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 600,
            backgroundColor: '#000000',
            physics: {
                default: 'arcade',
                arcade: {
                    gravity: { y: 0 },
                    debug: false
                }
            },
            scene: CosmicCourierGame
        };
        
        const game = new Phaser.Game(config);
    </script>
</body>
</html>
