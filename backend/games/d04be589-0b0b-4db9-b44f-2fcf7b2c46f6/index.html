<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Galaxy Defender</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #000;
            font-family: 'Courier New', monospace;
        }
        #game-container {
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <script>
        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 600,
            parent: 'game-container',
            backgroundColor: '#000000',
            physics: {
                default: 'arcade',
                arcade: {
                    gravity: { y: 0 },
                    debug: false
                }
            },
            scene: [TitleScene, GameScene, GameOverScene, WinScene]
        };

        const game = new Phaser.Game(config);

        class TitleScene extends Phaser.Scene {
            constructor() {
                super({ key: 'TitleScene' });
            }

            create() {
                this.cameras.main.setBackgroundColor('#000033');
                
                const stars = this.add.graphics();
                for (let i = 0; i < 100; i++) {
                    const x = Phaser.Math.Between(0, 800);
                    const y = Phaser.Math.Between(0, 600);
                    const size = Phaser.Math.Between(1, 3);
                    stars.fillStyle(0xFFFFFF, Phaser.Math.FloatBetween(0.3, 1));
                    stars.fillCircle(x, y, size);
                }

                this.add.text(400, 150, 'NEON GALAXY', {
                    fontSize: '64px',
                    fontFamily: 'Courier New',
                    color: '#00FFFF',
                    stroke: '#FF00FF',
                    strokeThickness: 4
                }).setOrigin(0.5);

                this.add.text(400, 220, 'DEFENDER', {
                    fontSize: '64px',
                    fontFamily: 'Courier New',
                    color: '#FF00FF',
                    stroke: '#00FFFF',
                    strokeThickness: 4
                }).setOrigin(0.5);

                const startButton = this.add.text(400, 350, 'START GAME', {
                    fontSize: '32px',
                    fontFamily: 'Courier New',
                    color: '#00FF00',
                    stroke: '#000000',
                    strokeThickness: 4
                }).setOrigin(0.5).setInteractive();

                startButton.on('pointerover', () => {
                    startButton.setColor('#FFFF00');
                });

                startButton.on('pointerout', () => {
                    startButton.setColor('#00FF00');
                });

                startButton.on('pointerdown', () => {
                    this.scene.start('GameScene');
                });

                this.add.text(400, 450, 'Arrow Keys / WASD to Move', {
                    fontSize: '20px',
                    fontFamily: 'Courier New',
                    color: '#FFFFFF'
                }).setOrigin(0.5);

                this.add.text(400, 480, 'Auto-Fire - Collect Power-Ups!', {
                    fontSize: '20px',
                    fontFamily: 'Courier New',
                    color: '#FFFFFF'
                }).setOrigin(0.5);

                this.tweens.add({
                    targets: startButton,
                    scaleX: 1.1,
                    scaleY: 1.1,
                    duration: 800,
                    yoyo: true,
                    repeat: -1
                });
            }
        }

        class GameScene extends Phaser.Scene {
            constructor() {
                super({ key: 'GameScene' });
                this.score = 0;
                this.lives = 3;
                this.level = 1;
                this.playerSpeed = 300;
                this.fireRate = 200;
                this.nextFire = 0;
                this.tripleShot = false;
                this.tripleShotTimer = 0;
                this.shield = false;
                this.shieldTimer = 0;
                this.speedBoost = false;
                this.speedBoostTimer = 0;
                this.enemySpawnTimer = 0;
                this.waveNumber = 0;
                this.bossActive = false;
                this.enemiesDestroyed = 0;
            }

            create() {
                this.score = 0;
                this.lives = 3;
                this.level = 1;
                this.playerSpeed = 300;
                this.tripleShot = false;
                this.shield = false;
                this.speedBoost = false;
                this.bossActive = false;
                this.enemiesDestroyed = 0;
                this.waveNumber = 0;

                this.createBackground();
                this.createSounds();
                this.createPlayer();
                this.createGroups();
                this.createUI();
                this.setupInput();
                this.setupCollisions();

                this.bgMusic = this.sound.add('bgMusic', { loop: true, volume: 0.3 });
                this.bgMusic.play();
            }

            createBackground() {
                this.starfield = this.add.graphics();
                this.stars = [];
                for (let i = 0; i < 150; i++) {
                    this.stars.push({
                        x: Phaser.Math.Between(0, 800),
                        y: Phaser.Math.Between(0, 600),
                        speed: Phaser.Math.FloatBetween(0.5, 3),
                        size: Phaser.Math.Between(1, 3)
                    });
                }
            }

            createSounds() {
                if (!this.sound.get('shoot')) {
                    const shootSound = this.sound.add('shoot', { volume: 0.2 });
                }
                if (!this.sound.get('explosion')) {
                    const explosionSound = this.sound.add('explosion', { volume: 0.3 });
                }
                if (!this.sound.get('powerup')) {
                    const powerupSound = this.sound.add('powerup', { volume: 0.4 });
                }
                if (!this.sound.get('hit')) {
                    const hitSound = this.sound.add('hit', { volume: 0.3 });
                }
                if (!this.sound.get('bgMusic')) {
                    const bgMusic = this.sound.add('bgMusic', { volume: 0.3 });
                }
            }

            createPlayer() {
                this.player = this.add.graphics();
                this.player.x = 400;
                this.player.y = 520;
                this.drawPlayer();
                
                this.physics.add.existing(this.player);
                this.player.body.setSize(32, 32);
                this.player.body.setCollideWorldBounds(true);

                this.shieldGraphic = this.add.graphics();
                this.shieldGraphic.lineStyle(3, 0x00FFFF, 0.8);
                this.shieldGraphic.strokeCircle(0, 0, 25);
                this.shieldGraphic.visible = false;
            }

            drawPlayer() {
                this.player.clear();
                this.player.fillStyle(0x00FFFF, 1);
                this.player.fillTriangle(0, -16, -12, 16, 12, 16);
                this.player.fillStyle(0xFF00FF, 1);
                this.player.fillRect(-8, 8, 4, 8);
                this.player.fillRect(4, 8, 4, 8);
                this.player.fillStyle(0xFFFF00, 1);
                this.player.fillCircle(0, 0, 4);
            }

            createGroups() {
                this.bullets = this.physics.add.group({
                    defaultKey: 'bullet',
                    maxSize: 50
                });

                this.enemies = this.physics.add.group();
                this.enemyBullets = this.physics.add.group({
                    maxSize: 50
                });
                this.powerUps = this.physics.add.group();
            }

            createUI() {
                this.scoreText = this.add.text(16, 16, 'SCORE: 0', {
                    fontSize: '24px',
                    fontFamily: 'Courier New',
                    color: '#00FF00',
                    stroke: '#000000',
                    strokeThickness: 3
                });

                this.livesText = this.add.text(16, 50, 'LIVES: 3', {
                    fontSize: '24px',
                    fontFamily: 'Courier New',
                    color: '#FF00FF',
                    stroke: '#000000',
                    strokeThickness: 3
                });

                this.levelText = this.add.text(16, 84, 'LEVEL: 1', {
                    fontSize: '24px',
                    fontFamily: 'Courier New',
                    color: '#00FFFF',
                    stroke: '#000000',
                    strokeThickness: 3
                });

                this.powerUpText = this.add.text(400, 16, '', {
                    fontSize: '20px',
                    fontFamily: 'Courier New',
                    color: '#FFFF00',
                    stroke: '#000000',
                    strokeThickness: 3
                }).setOrigin(0.5);
            }

            setupInput() {
                this.cursors = this.input.keyboard.createCursorKeys();
                this.wasd = this.input.keyboard.addKeys({
                    up: Phaser.Input.Keyboard.KeyCodes.W,
                    down: Phaser.Input.Keyboard.KeyCodes.S,
                    left: Phaser.Input.Keyboard.KeyCodes.A,
                    right: Phaser.Input.Keyboard.KeyCodes.D
                });
            }

            setupCollisions() {
                this.physics.add.overlap(this.bullets, this.enemies, this.hitEnemy, null, this);
                this.physics.add.overlap(this.player, this.enemies, this.playerHit, null, this);
                this.physics.add.overlap(this.player, this.enemyBullets, this.playerHitByBullet, null, this);
                this.physics.add.overlap(this.player, this.powerUps, this.collectPowerUp, null, this);
            }

            update(time, delta) {
                this.updateBackground();
                this.handleInput();
                this.autoFire(time);
                this.updatePowerUps(delta);
                this.spawnEnemies(time);
                this.updateEnemies();
                this.updateBullets();
                this.updateEnemyBullets();
                this.updateShield();
            }

            updateBackground() {
                this.starfield.clear();
                this.stars.forEach(star => {
                    star.y += star.speed;
                    if (star.y > 600) {
                        star.y = 0;
                        star.x = Phaser.Math.Between(0, 800);
                    }
                    this.starfield.fillStyle(0xFFFFFF, Phaser.Math.FloatBetween(0.3, 1));
                    this.starfield.fillCircle(star.x, star.y, star.size);
                });
            }

            handleInput() {
                const speed = this.speedBoost ? this.playerSpeed * 1.5 : this.playerSpeed;
                
                if (this.cursors.left.isDown || this.wasd.left.isDown) {
                    this.player.body.setVelocityX(-speed);
                } else if (this.cursors.right.isDown || this.wasd.right.isDown) {
                    this.player.body.setVelocityX(speed);
                } else {
                    this.player.body.setVelocityX(0);
                }
            }

            autoFire(time) {
                if (time > this.nextFire) {
                    this.fireBullet();
                    this.nextFire = time + this.fireRate;
                }
            }

            fireBullet() {
                this.sound.play('shoot');
                
                if (this.tripleShot) {
                    this.createBullet(this.player.x, this.player.y - 20, 0);
                    this.createBullet(this.player.x - 15, this.player.y - 10, -50);
                    this.createBullet(this.player.x + 15, this.player.y - 10, 50);
                } else {
                    this.createBullet(this.player.x, this.player.y - 20, 0);
                }
            }

            createBullet(x, y, velocityX) {
                let bullet = this.bullets.get();
                if (!bullet) {
                    bullet = this.add.graphics();
                    this.physics.add.existing(bullet);
                    this.bullets.add(bullet);
                }
                
                bullet.clear();
                bullet.fillStyle(0x00FF00, 1);
                bullet.fillRect(-2, -4, 4, 8);
                bullet.x = x;
                bullet.y = y;
                bullet.setActive(true);
                bullet.setVisible(true);
                bullet.body.velocity.y = -500;
                bullet.body.velocity.x = velocityX;
            }

            updateBullets() {
                this.bullets.children.entries.forEach(bullet => {
                    if (bullet.active && (bullet.y < -10 || bullet.x < 0 || bullet.x > 800)) {
                        bullet.setActive(false);
                        bullet.setVisible(false);
                    }
                });
            }

            updateEnemyBullets() {
                this.enemyBullets.children.entries.forEach(bullet => {
                    if (bullet.active && (bullet.y > 610 || bullet.x < -10 || bullet.x > 810)) {
                        bullet.setActive(false);
                        bullet.setVisible(false);
                    }
                });
            }

            spawnEnemies(time) {
                if (this.bossActive) return;

                if (time > this.enemySpawnTimer) {
                    const enemyType = Phaser.Math.Between(1, 10);
                    let enemy;

                    if (enemyType <= 6) {
                        enemy = this.createGrunt();
                    } else if (enemyType <= 9) {
                        enemy = this.createDart();
                    } else {
                        enemy = this.createBomber();
                    }

                    this.enemySpawnTimer = time + Phaser.Math.Between(800 - this.level * 100, 1500 - this.level * 150);
                }

                if (this.enemiesDestroyed >= 20 + this.level * 10 && this.level === 3 && !this.bossActive) {
                    this.spawnBoss();
                } else if (this.enemiesDestroyed >= 20 + this.level * 10 && this.level < 3) {
                    this.nextLevel();
                }
            }

            createGrunt() {
                const enemy = this.add.graphics();
                enemy.fillStyle(0xFF0000, 1);
                enemy.fillRect(-8, -8, 16, 16);
                enemy.fillStyle(0xFF6600, 1);
                enemy.fillCircle(0, 0, 4);
                enemy.x = Phaser.Math.Between(50, 750);
                enemy.y = -20;
                enemy.enemyType = 'grunt';
                enemy.health = 1;
                
                this.physics.add.existing(enemy);
                enemy.body.setSize(16, 16);
                enemy.body.velocity.y = 150 + this.level * 20;
                this.enemies.add(enemy);
                
                return enemy;
            }

            createDart() {
                const enemy = this.add.graphics();
                enemy.fillStyle(0xFF00FF, 1);
                enemy.fillTriangle(0, -10, -8, 10, 8, 10);
                enemy.x = Phaser.Math.Between(50, 750);
                enemy.y = -20;
                enemy.enemyType = 'dart';
                enemy.health = 1;
                enemy.direction = Phaser.Math.Between(0, 1) === 0 ? -1 : 1;
                
                this.physics.add.existing(enemy);
                enemy.body.setSize(16, 20);
                enemy.body.velocity.y = 200 + this.level * 30;
                enemy.body.velocity.x = enemy.direction * 100;
                this.enemies.add(enemy);
                
                return enemy;
            }

            createBomber() {
                const enemy = this.add.graphics();
                enemy.fillStyle(0xFFFF00, 1);
                enemy.fillRect(-12, -8, 24, 16);
                enemy.fillStyle(0xFF6600, 1);
                enemy.fillRect(-6, 8, 4, 4);
                enemy.fillRect(2, 8, 4, 4);
                enemy.x = Phaser.Math.Between(50, 750);
                enemy.y = -20;
                enemy.enemyType = 'bomber';
                enemy.health = 2;
                enemy.lastShot = 0;
                
                this.physics.add.existing(enemy);
                enemy.body.setSize(24, 16);
                enemy.body.velocity.y = 100 + this.level * 15;
                this.enemies.add(enemy);
                
                return enemy;
            }

            spawnBoss() {
                this.bossActive = true;
                const boss = this.add.graphics();
                
                boss.fillStyle(0xFF0000, 1);
                boss.fillRect(-32, -32, 64, 64);
                boss.fillStyle(0xFF6600, 1);
                boss.fillCircle(-16, -16, 8);
                boss.fillCircle(16, -16, 8);
                boss.fillCircle(0, 0, 12);
                boss.fillStyle(0xFFFF00, 1);
                boss.fillTriangle(-20, 32, 0, 40, -10, 32);
                boss.fillTriangle(20, 32, 0, 40, 10, 32);
                
                boss.x = 400;
                boss.y = -64;
                boss.enemyType = 'boss';
                boss.health = 50 + this.level * 20;
                boss.maxHealth = boss.health;
                boss.lastShot = 0;
                boss.moveTimer = 0;
                boss.moveDirection = 1;
                
                this.physics.add.existing(boss);
                boss.body.setSize(64, 64);
                this.enemies.add(boss);
                
                this.tweens.add({
                    targets: boss,
                    y: 100,
                    duration: 2000,
                    ease: 'Power2'
                });

                this.bossHealthBar = this.add.graphics();
                this.bossHealthBarBg = this.add.graphics();
            }

            updateEnemies() {
                this.enemies.children.entries.forEach(enemy => {
                    if (!enemy.active) return;

                    if (enemy.enemyType === 'bomber' && enemy.y > 0 && enemy.y < 500) {
                        if (this.time.now > enemy.lastShot + 1500) {
                            this.enemyShoot(enemy);
                            enemy.lastShot = this.time.now;
                        }
                    }

                    if (enemy.enemyType === 'boss') {
                        enemy.moveTimer += 16;
                        if (enemy.moveTimer > 2000) {
                            enemy.moveDirection *= -1;
                            enemy.moveTimer = 0;
                        }
                        enemy.body.velocity.x = enemy.moveDirection * 150;

                        if (enemy.x < 100) {
                            enemy.moveDirection = 1;
                        } else if (enemy.x > 700) {
                            enemy.moveDirection = -1;
                        }

                        if (this.time.now > enemy.lastShot + 800) {
                            this.bossShoot(enemy);
                            enemy.lastShot = this.time.now;
                        }

                        this.updateBossHealthBar(enemy);
                    }

                    if (enemy.y > 620 && enemy.enemyType !== 'boss') {
                        enemy.destroy();
                    }
                });
            }

            enemyShoot(enemy) {
                let bullet = this.enemyBullets.get();
                if (!bullet) {
                    bullet = this.add.graphics();
                    this.physics.add.existing(bullet);
                    this.enemyBullets.add(bullet);
                }
                
                bullet.clear();
                bullet.fillStyle(0xFF6600, 1);
                bullet.fillCircle(0, 0, 4);
                bullet.x = enemy.x;
                bullet.y = enemy.y + 16;
                bullet.setActive(true);
                bullet.setVisible(true);
                bullet.body.velocity.y = 300;
            }

            bossShoot(boss) {
                const angles = [-30, 0, 30];
                angles.forEach(angle => {
                    let bullet = this.enemyBullets.get();
                    if (!bullet) {
                        bullet = this.add.graphics();
                        this.physics.add.existing(bullet);
                        this.enemyBullets.add(bullet);
                    }
                    
                    bullet.clear();
                    bullet.fillStyle(0xFF0000, 1);
                    bullet.fillCircle(0, 0, 6);
                    bullet.x = boss.x;
                    bullet.y = boss.y + 32;
                    bullet.setActive(true);
                    bullet.setVisible(true);
                    
                    const rad = Phaser.Math.DegToRad(angle);
                    bullet.body.velocity.y = 250 * Math.cos(rad);
                    bullet.body.velocity.x = 250 * Math.sin(rad);
                });
            }

            updateBossHealthBar(boss) {
                if (!this.bossHealthBarBg) return;

                this.bossHealthBarBg.clear();
                this.bossHealthBarBg.fillStyle(0x000000, 0.7);
                this.bossHealthBarBg.fillRect(250, 30, 300, 20);
                this.bossHealthBarBg.lineStyle(2, 0xFFFFFF, 1);
                this.bossHealthBarBg.strokeRect(250, 30, 300, 20);

                this.bossHealthBar.clear();
                const healthPercent = boss.health / boss.maxHealth;
                const barWidth = 296 * healthPercent;
                const color = healthPercent > 0.5 ? 0x00FF00 : healthPercent > 0.25 ? 0xFFFF00 : 0xFF0000;
                this.bossHealthBar.fillStyle(color, 1);
                this.bossHealthBar.fillRect(252, 32, barWidth, 16);
            }

            hitEnemy(bullet, enemy) {
                bullet.setActive(false);
                bullet.setVisible(false);

                enemy.health -= 1;

                this.cameras.main.shake(50, 0.002);

                if (enemy.health <= 0) {
                    this.sound.play('explosion');
                    this.createExplosion(enemy.x, enemy.y, enemy.enemyType === 'boss');
                    
                    const points = enemy.enemyType === 'boss' ? 1000 : 
                                 enemy.enemyType === 'bomber' ? 30 : 
                                 enemy.enemyType === 'dart' ? 20 : 10;
                    this.score += points;
                    this.scoreText.setText('SCORE: ' + this.score);

                    if (enemy.enemyType === 'boss') {
                        this.bossDefeated();
                    } else {
                        if (Phaser.Math.Between(1, 100) <= 15) {
                            this.spawnPowerUp(enemy.x, enemy.y);
                        }
                        this.enemiesDestroyed++;
                    }

                    enemy.destroy();
                }
            }

            playerHit(player, enemy) {
                if (this.shield) return;

                this.sound.play('hit');
                this.cameras.main.shake(200, 0.01);
                this.lives--;
                this.livesText.setText('LIVES: ' + this.lives);

                this.createExplosion(player.x, player.y, false);

                if (this.lives <= 0) {
                    this.gameOver();
                } else {
                    this.player.alpha = 0.5;
                    this.shield = true;
                    this.shieldTimer = 2000;
                    this.time.delayedCall(2000, () => {
                        this.player.alpha = 1;
                    });
                }

                if (enemy.enemyType !== 'boss') {
                    enemy.destroy();
                }
            }

            playerHitByBullet(player, bullet) {
                if (this.shield) {
                    bullet.setActive(false);
                    bullet.setVisible(false);
                    return;
                }

                this.sound.play('hit');
                this.cameras.main.shake(150, 0.008);
                this.lives--;
                this.livesText.setText('LIVES: ' + this.lives);

                bullet.setActive(false);
                bullet.setVisible(false);

                if (this.lives <= 0) {
                    this.gameOver();
                } else {
                    this.player.alpha = 0.5;
                    this.shield = true;
                    this.shieldTimer = 2000;
                    this.time.delayedCall(2000, () => {
                        this.player.alpha = 1;
                    });
                }
            }

            spawnPowerUp(x, y) {
                const types = ['triple', 'shield', 'speed'];
                const type = Phaser.Utils.Array.GetRandom(types);
                
                const powerUp = this.add.graphics();
                powerUp.powerUpType = type;
                
                if (type === 'triple') {
                    powerUp.fillStyle(0x00FF00, 1);
                    powerUp.fillRect(-8, -8, 16, 16);
                    powerUp.fillStyle(0xFFFF00, 1);
                    powerUp.fillTriangle(0, -6, -4, 0, 4, 0);
                    powerUp.fillTriangle(0, -3, -4, 3, 4, 3);
                    powerUp.fillTriangle(0, 0, -4, 6, 4, 6);
                } else if (type === 'shield') {
                    powerUp.fillStyle(0x00FFFF, 1);
                    powerUp.fillCircle(0, 0, 8);
                    powerUp.lineStyle(2, 0xFFFFFF, 1);
                    powerUp.strokeCircle(0, 0, 8);
                } else if (type === 'speed') {
                    powerUp.fillStyle(0xFFFF00, 1);
                    powerUp.fillTriangle(0, -8, -6, 8, 6, 8);
                    powerUp.fillStyle(0xFFFFFF, 1);
                    powerUp.fillTriangle(0, -4, -3, 4, 3, 4);
                }

                powerUp.x = x;
                powerUp.y = y;
                
                this.physics.add.existing(powerUp);
                powerUp.body.setSize(16, 16);
                powerUp.body.velocity.y = 100;
                this.powerUps.add(powerUp);

                this.tweens.add({
                    targets: powerUp,
                    angle: 360,
                    duration: 2000,
                    repeat: -1
                });
            }

            collectPowerUp(player, powerUp) {
                this.sound.play('powerup');
                powerUp.destroy();

                if (powerUp.powerUpType === 'triple') {
                    this.tripleShot = true;
                    this.tripleShotTimer = 8000;
                    this.powerUpText.setText('TRIPLE SHOT!');
                } else if (powerUp.powerUpType === 'shield') {
                    this.shield = true;
                    this.shieldTimer = 8000;
                    this.powerUpText.setText('SHIELD ACTIVE!');
                } else if (powerUp.powerUpType === 'speed') {
                    this.speedBoost = true;
                    this.speedBoostTimer = 8000;
                    this.powerUpText.setText('SPEED BOOST!');
                }

                this.time.delayedCall(2000, () => {
                    this.powerUpText.setText('');
                });
            }

            updatePowerUps(delta) {
                if (this.tripleShot) {
                    this.tripleShotTimer -= delta;
                    if (this.tripleShotTimer <= 0) {
                        this.tripleShot = false;
                    }
                }

                if (this.shield && this.shieldTimer > 2000) {
                    this.shieldTimer -= delta;
                    if (this.shieldTimer <= 2000) {
                        this.shield = false;
                    }
                }

                if (this.speedBoost) {
                    this.speedBoostTimer -= delta;
                    if (this.speedBoostTimer <= 0) {
                        this.speedBoost = false;
                    }
                }
            }

            updateShield() {
                if (this.shield && this.shieldTimer > 2000) {
                    this.shieldGraphic.visible = true;
                    this.shieldGraphic.x = this.player.x;
                    this.shieldGraphic.y = this.player.y;
                    this.shieldGraphic.rotation += 0.05;
                } else {
                    this.shieldGraphic.visible = false;
                }
            }

            createExplosion(x, y, isBig) {
                const particles = isBig ? 30 : 15;
                const colors = [0xFF0000, 0xFF6600, 0xFFFF00, 0xFFFFFF];
                
                for (let i = 0; i < particles; i++) {
                    const particle = this.add.graphics();
                    const color = Phaser.Utils.Array.GetRandom(colors);
                    particle.fillStyle(color, 1);
                    const size = Phaser.Math.Between(2, isBig ? 8 : 4);
                    particle.fillCircle(0, 0, size);
                    particle.x = x;
                    particle.y = y;

                    const angle = Phaser.Math.Between(0, 360);
                    const speed = Phaser.Math.Between(50, isBig ? 300 : 150);
                    const rad = Phaser.Math.DegToRad(angle);

                    this.tweens.add({
                        targets: particle,
                        x: x + Math.cos(rad) * speed,
                        y: y + Math.sin(rad) * speed,
                        alpha: 0,
                        duration: isBig ? 800 : 500,
                        onComplete: () => particle.destroy()
                    });
                }
            }

            bossDefeated() {
                this.bossActive = false;
                if (this.bossHealthBar) this.bossHealthBar.destroy();
                if (this.bossHealthBarBg) this.bossHealthBarBg.destroy();
                
                this.cameras.main.shake(500, 0.02);
                
                this.time.delayedCall(1000, () => {
                    if (this.level < 3) {
                        this.nextLevel();
                    } else {
                        this.winGame();
                    }
                });
            }

            nextLevel() {
                this.level++;
                this.levelText.setText('LEVEL: ' + this.level);
                this.enemiesDestroyed = 0;

                const levelText = this.add.text(400, 300, 'LEVEL ' + this.level, {
                    fontSize: '64px',
                    fontFamily: 'Courier New',
                    color: '#00FFFF',
                    stroke: '#000000',
                    strokeThickness: 6
                }).setOrigin(0.5);

                this.tweens.add({
                    targets: levelText,
                    alpha: 0,
                    duration: 2000,
                    onComplete: () => levelText.destroy()
                });
            }

            gameOver() {
                this.bgMusic.stop();
                this.scene.start('GameOverScene', { score: this.score });
            }

            winGame() {
                this.bgMusic.stop();
                this.scene.start('WinScene', { score: this.score });
            }
        }

        class GameOverScene extends Phaser.Scene {
            constructor() {
                super({ key: 'GameOverScene' });
            }

            init(data) {
                this.finalScore = data.score || 0;
            }

            create() {
                this.cameras.main.setBackgroundColor('#000000');

                this.add.text(400, 200, 'GAME OVER', {
                    fontSize: '64px',
                    fontFamily: 'Courier New',
                    color: '#FF0000',
                    stroke: '#000000',
                    strokeThickness: 6
                }).setOrigin(0.5);

                this.add.text(400, 300, 'FINAL SCORE: ' + this.finalScore, {
                    fontSize: '32px',
                    fontFamily: 'Courier New',
                    color: '#FFFFFF',
                    stroke: '#000000',
                    strokeThickness: 4
                }).setOrigin(0.5);

                const restartButton = this.add.text(400, 400, 'RESTART', {
                    fontSize: '32px',
                    fontFamily: 'Courier New',
                    color: '#00FF00',
                    stroke: '#000000',
                    strokeThickness: 4
                }).setOrigin(0.5).setInteractive();

                restartButton.on('pointerover', () => {
                    restartButton.setColor('#FFFF00');
                });

                restartButton.on('pointerout', () => {
                    restartButton.setColor('#00FF00');
                });

                restartButton.on('pointerdown', () => {
                    this.scene.start('GameScene');
                });

                const titleButton = this.add.text(400, 460, 'MAIN MENU', {
                    fontSize: '24px',
                    fontFamily: 'Courier New',
                    color: '#00FFFF',
                    stroke: '#000000',
                    strokeThickness: 3
                }).setOrigin(0.5).setInteractive();

                titleButton.on('pointerover', () => {
                    titleButton.setColor('#FFFF00');
                });

                titleButton.on('pointerout', () => {
                    titleButton.setColor('#00FFFF');
                });

                titleButton.on('pointerdown', () => {
                    this.scene.start('TitleScene');
                });
            }
        }

        class WinScene extends Phaser.Scene {
            constructor() {
                super({ key: 'WinScene' });
            }

            init(data) {
                this.finalScore = data.score || 0;
            }

            create() {
                this.cameras.main.setBackgroundColor('#000033');

                const stars = this.add.graphics();
                for (let i = 0; i < 150; i++) {
                    const x = Phaser.Math.Between(0, 800);
                    const y = Phaser.Math.Between(0, 600);
                    const size = Phaser.Math.Between(1, 3);
                    stars.fillStyle(0xFFFFFF, Phaser.Math.FloatBetween(0.3, 1));
                    stars.fillCircle(x, y, size);
                }

                const victoryText = this.add.text(400, 150, 'VICTORY!', {
                    fontSize: '72px',
                    fontFamily: 'Courier New',
                    color: '#00FF00',
                    stroke: '#FFFF00',
                    strokeThickness: 6
                }).setOrigin(0.5);

                this.tweens.add({
                    targets: victoryText,
                    scaleX: 1.1,
                    scaleY: 1.1,
                    duration: 1000,
                    yoyo: true,
                    repeat: -1
                });

                this.add.text(400, 250, 'GALAXY SAVED!', {
                    fontSize: '32px',
                    fontFamily: 'Courier New',
                    color: '#00FFFF',
                    stroke: '#000000',
                    strokeThickness: 4
                }).setOrigin(0.5);

                this.add.text(400, 320, 'FINAL SCORE: ' + this.finalScore, {
                    fontSize: '32px',
                    fontFamily: 'Courier New',
                    color: '#FFFFFF',
                    stroke: '#000000',
                    strokeThickness: 4
                }).setOrigin(0.5);

                const playAgainButton = this.add.text(400, 420, 'PLAY AGAIN', {
                    fontSize: '32px',
                    fontFamily: 'Courier New',
                    color: '#00FF00',
                    stroke: '#000000',
                    strokeThickness: 4
                }).setOrigin(0.5).setInteractive();

                playAgainButton.on('pointerover', () => {
                    playAgainButton.setColor('#FFFF00');
                });

                playAgainButton.on('pointerout', () => {
                    playAgainButton.setColor('#00FF00');
                });

                playAgainButton.on('pointerdown', () => {
                    this.scene.start('GameScene');
                });

                const titleButton = this.add.text(400, 480, 'MAIN MENU', {
                    fontSize: '24px',
                    fontFamily: 'Courier New',
                    color: '#00FFFF',
                    stroke: '#000000',
                    strokeThickness: 3
                }).setOrigin(0.5).setInteractive();

                titleButton.on('pointerover', () => {
                    titleButton.setColor('#FFFF00');
                });

                titleButton.on('pointerout', () => {
                    titleButton.setColor('#00FFFF');
                });

                titleButton.on('pointerdown', () => {
                    this.scene.start('TitleScene');
                });
            }
        }

        class AudioManager {
            static createSound(scene, key) {
                if (scene.sound.get(key)) return;

                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                switch(key) {
                    case 'shoot':
                        this.generateShootSound(scene, audioContext);
                        break;
                    case 'explosion':
                        this.generateExplosionSound(scene, audioContext);
                        break;
                    case 'powerup':
                        this.generatePowerUpSound(scene, audioContext);
                        break;
                    case 'hit':
                        this.generateHitSound(scene, audioContext);
                        break;
                    case 'bgMusic':
                        this.generateBgMusic(scene, audioContext);
                        break;
                }
            }

            static generateShootSound(scene, audioContext) {
                const duration = 0.1;
                const sampleRate = audioContext.sampleRate;
                const buffer = audioContext.createBuffer(1, duration * sampleRate, sampleRate);
                const data = buffer.getChannelData(0);

                for (let i = 0; i < buffer.length; i++) {
                    data[i] = Math.random() * 0.3 - 0.15;
                }

                scene.cache.audio.add('shoot', buffer);
            }

            static generateExplosionSound(scene, audioContext) {
                const duration = 0.3;
                const sampleRate = audioContext.sampleRate;
                const buffer = audioContext.createBuffer(1, duration * sampleRate, sampleRate);
                const data = buffer.getChannelData(0);

                for (let i = 0; i < buffer.length; i++) {
                    const t = i / sampleRate;
                    data[i] = (Math.random() * 2 - 1) * Math.exp(-t * 5);
                }

                scene.cache.audio.add('explosion', buffer);
            }

            static generatePowerUpSound(scene, audioContext) {
                const duration = 0.3;
                const sampleRate = audioContext.sampleRate;
                const buffer = audioContext.createBuffer(1, duration * sampleRate, sampleRate);
                const data = buffer.getChannelData(0);

                for (let i = 0; i < buffer.length; i++) {
                    const t = i / sampleRate;
                    const freq = 440 + t * 880;
                    data[i] = Math.sin(2 * Math.PI * freq * t) * 0.3 * (1 - t / duration);
                }

                scene.cache.audio.add('powerup', buffer);
            }

            static generateHitSound(scene, audioContext) {
                const duration = 0.2;
                const sampleRate = audioContext.sampleRate;
                const buffer = audioContext.createBuffer(1, duration * sampleRate, sampleRate);
                const data = buffer.getChannelData(0);

                for (let i = 0; i < buffer.length; i++) {
                    const t = i / sampleRate;
                    data[i] = (Math.random() * 2 - 1) * 0.5 * Math.exp(-t * 8);
                }

                scene.cache.audio.add('hit', buffer);
            }

            static generateBgMusic(scene, audioContext) {
                const duration = 4;
                const sampleRate = audioContext.sampleRate;
                const buffer = audioContext.createBuffer(1, duration * sampleRate, sampleRate);
                const data = buffer.getChannelData(0);

                const notes = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00];
                
                for (let i = 0; i < buffer.length; i++) {
                    const t = i / sampleRate;
                    const noteIndex = Math.floor((t / duration) * notes.length);
                    const freq = notes[noteIndex % notes.length];
                    data[i] = Math.sin(2 * Math.PI * freq * t) * 0.1;
                }

                scene.cache.audio.add('bgMusic', buffer);
            }
        }

        window.addEventListener('load', () => {
            AudioManager.createSound(game.scene.scenes[0], 'shoot');
            AudioManager.createSound(game.scene.scenes[0], 'explosion');
            AudioManager.createSound(game.scene.scenes[0], 'powerup');
            AudioManager.createSound(game.scene.scenes[0], 'hit');
            AudioManager.createSound(game.scene.scenes[0], 'bgMusic');
        });
    </script>
