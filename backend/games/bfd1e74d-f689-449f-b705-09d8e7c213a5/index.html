<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Courier</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #000;
            font-family: 'Arial', sans-serif;
        }
        #game-container {
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <script>
        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 600,
            parent: 'game-container',
            backgroundColor: '#000814',
            physics: {
                default: 'arcade',
                arcade: {
                    gravity: { y: 0 },
                    debug: false
                }
            },
            scene: {
                preload: preload,
                create: create,
                update: update
            }
        };

        const game = new Phaser.Game(config);

        let player;
        let cursors;
        let wasd;
        let spaceKey;
        let enemies;
        let bullets;
        let enemyBullets;
        let stars;
        let deliveryPoint;
        let packageIntegrity = 100;
        let score = 0;
        let wave = 1;
        let enemiesInWave = 5;
        let enemiesKilled = 0;
        let gameOver = false;
        let canShoot = true;
        let shootDelay = 300;
        let packageText;
        let scoreText;
        let waveText;
        let gameOverText;
        let restartText;
        let explosions;
        let powerUps;
        let playerSpeed = 250;
        let packageDelivered = false;
        let nextWaveTimer;
        let backgroundMusic;
        let shootSound;
        let explosionSound;
        let powerUpSound;
        let deliverySound;
        let hitSound;

        function preload() {
            this.load.audio('bgm', ['data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=']);
        }

        function create() {
            createSounds.call(this);
            createStarfield.call(this);
            createPlayer.call(this);
            createDeliveryPoint.call(this);
            createGroups.call(this);
            createUI.call(this);
            setupInput.call(this);
            spawnWave.call(this);
            
            if (backgroundMusic) {
                backgroundMusic.play();
            }
        }

        function createSounds() {
            const audioContext = this.sound.context;
            if (audioContext) {
                shootSound = this.sound.add('shoot', { volume: 0.3 });
                explosionSound = this.sound.add('explosion', { volume: 0.4 });
                powerUpSound = this.sound.add('powerup', { volume: 0.3 });
                deliverySound = this.sound.add('delivery', { volume: 0.5 });
                hitSound = this.sound.add('hit', { volume: 0.3 });
            }
        }

        function createStarfield() {
            stars = this.add.group();
            for (let i = 0; i < 200; i++) {
                const x = Phaser.Math.Between(0, 800);
                const y = Phaser.Math.Between(0, 600);
                const size = Phaser.Math.Between(1, 3);
                const star = this.add.circle(x, y, size, 0xffffff, Phaser.Math.FloatBetween(0.3, 1));
                star.speed = size * 0.5;
                stars.add(star);
            }
        }

        function createPlayer() {
            player = this.add.graphics();
            player.x = 100;
            player.y = 300;
            
            player.fillStyle(0x00ffff, 1);
            player.fillTriangle(0, -15, -10, 15, 10, 15);
            player.fillStyle(0x0088ff, 1);
            player.fillRect(-6, 10, 3, 8);
            player.fillRect(3, 10, 3, 8);
            
            this.physics.add.existing(player);
            player.body.setSize(20, 30);
            player.body.setCollideWorldBounds(true);
            player.body.setDamping(true);
            player.body.setDrag(0.8);
            player.health = 100;
        }

        function createDeliveryPoint() {
            deliveryPoint = this.add.graphics();
            deliveryPoint.x = 700;
            deliveryPoint.y = 300;
            
            deliveryPoint.lineStyle(3, 0x00ff00, 1);
            deliveryPoint.strokeCircle(0, 0, 25);
            deliveryPoint.lineStyle(2, 0x00ff00, 0.5);
            deliveryPoint.strokeCircle(0, 0, 35);
            deliveryPoint.fillStyle(0x00ff00, 0.2);
            deliveryPoint.fillCircle(0, 0, 25);
            
            this.physics.add.existing(deliveryPoint);
            deliveryPoint.body.setCircle(25);
            
            this.tweens.add({
                targets: deliveryPoint,
                alpha: 0.5,
                duration: 1000,
                yoyo: true,
                repeat: -1
            });
        }

        function createGroups() {
            bullets = this.physics.add.group({
                defaultKey: 'bullet',
                maxSize: 20
            });

            enemyBullets = this.physics.add.group({
                defaultKey: 'enemyBullet',
                maxSize: 30
            });

            enemies = this.physics.add.group();
            
            explosions = this.add.group();
            
            powerUps = this.physics.add.group();

            this.physics.add.overlap(player, deliveryPoint, deliverPackage, null, this);
            this.physics.add.overlap(bullets, enemies, hitEnemy, null, this);
            this.physics.add.overlap(player, enemies, playerHitEnemy, null, this);
            this.physics.add.overlap(player, enemyBullets, playerHitByBullet, null, this);
            this.physics.add.overlap(player, powerUps, collectPowerUp, null, this);
        }

        function createUI() {
            packageText = this.add.text(16, 16, 'Package: 100%', {
                fontSize: '20px',
                fill: '#00ff00',
                fontStyle: 'bold'
            });

            scoreText = this.add.text(16, 46, 'Score: 0', {
                fontSize: '20px',
                fill: '#ffffff',
                fontStyle: 'bold'
            });

            waveText = this.add.text(400, 16, 'Wave: 1', {
                fontSize: '20px',
                fill: '#ffff00',
                fontStyle: 'bold'
            }).setOrigin(0.5, 0);
        }

        function setupInput() {
            cursors = this.input.keyboard.createCursorKeys();
            wasd = this.input.keyboard.addKeys({
                up: Phaser.Input.Keyboard.KeyCodes.W,
                down: Phaser.Input.Keyboard.KeyCodes.S,
                left: Phaser.Input.Keyboard.KeyCodes.A,
                right: Phaser.Input.Keyboard.KeyCodes.D
            });
            spaceKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
        }

        function spawnWave() {
            enemiesKilled = 0;
            enemiesInWave = 5 + (wave - 1) * 2;
            
            for (let i = 0; i < enemiesInWave; i++) {
                this.time.delayedCall(i * 800, () => {
                    if (!gameOver) {
                        spawnEnemy.call(this);
                    }
                }, [], this);
            }
        }

        function spawnEnemy() {
            const side = Phaser.Math.Between(0, 3);
            let x, y;
            
            switch(side) {
                case 0: x = Phaser.Math.Between(0, 800); y = -30; break;
                case 1: x = 830; y = Phaser.Math.Between(0, 600); break;
                case 2: x = Phaser.Math.Between(0, 800); y = 630; break;
                case 3: x = -30; y = Phaser.Math.Between(0, 600); break;
            }

            const enemy = this.add.graphics();
            enemy.x = x;
            enemy.y = y;
            
            enemy.fillStyle(0xff0000, 1);
            enemy.fillRect(-10, -10, 20, 20);
            enemy.fillStyle(0xff6600, 1);
            enemy.fillTriangle(0, -15, -8, -10, 8, -10);
            
            this.physics.add.existing(enemy);
            enemy.body.setSize(20, 20);
            enemy.health = 2 + Math.floor(wave / 3);
            enemy.shootTimer = 0;
            enemy.shootDelay = Phaser.Math.Between(1500, 3000);
            
            enemies.add(enemy);
        }

        function shootBullet() {
            if (!canShoot || gameOver || packageDelivered) return;
            
            const bullet = this.add.graphics();
            bullet.x = player.x + 15;
            bullet.y = player.y;
            
            bullet.fillStyle(0x00ffff, 1);
            bullet.fillCircle(0, 0, 4);
            bullet.lineStyle(2, 0xffffff, 0.8);
            bullet.strokeCircle(0, 0, 4);
            
            this.physics.add.existing(bullet);
            bullet.body.setCircle(4);
            bullet.body.setVelocityX(500);
            bullets.add(bullet);
            
            playSound(shootSound);
            
            canShoot = false;
            this.time.delayedCall(shootDelay, () => { canShoot = true; });
        }

        function enemyShoot(enemy) {
            if (gameOver || packageDelivered) return;
            
            const bullet = this.add.graphics();
            bullet.x = enemy.x;
            bullet.y = enemy.y;
            
            bullet.fillStyle(0xff0000, 1);
            bullet.fillCircle(0, 0, 3);
            
            this.physics.add.existing(bullet);
            bullet.body.setCircle(3);
            
            const angle = Phaser.Math.Angle.Between(enemy.x, enemy.y, player.x, player.y);
            this.physics.velocityFromRotation(angle, 200, bullet.body.velocity);
            
            enemyBullets.add(bullet);
        }

        function hitEnemy(bullet, enemy) {
            bullet.destroy();
            
            enemy.health--;
            
            enemy.setAlpha(0.5);
            this.time.delayedCall(100, () => {
                if (enemy.active) enemy.setAlpha(1);
            });
            
            if (enemy.health <= 0) {
                createExplosion.call(this, enemy.x, enemy.y, 0xff6600);
                playSound(explosionSound);
                
                score += 100 * wave;
                scoreText.setText('Score: ' + score);
                
                if (Phaser.Math.Between(1, 100) <= 15) {
                    spawnPowerUp.call(this, enemy.x, enemy.y);
                }
                
                enemy.destroy();
                enemiesKilled++;
                
                if (enemiesKilled >= enemiesInWave) {
                    nextWave.call(this);
                }
            }
        }

        function playerHitEnemy(player, enemy) {
            if (gameOver || packageDelivered) return;
            
            damagePackage.call(this, 20);
            createExplosion.call(this, enemy.x, enemy.y, 0xff0000);
            playSound(hitSound);
            enemy.destroy();
            
            this.cameras.main.shake(200, 0.01);
        }

        function playerHitByBullet(player, bullet) {
            if (gameOver || packageDelivered) return;
            
            bullet.destroy();
            damagePackage.call(this, 10);
            createExplosion.call(this, bullet.x, bullet.y, 0xff0000);
            playSound(hitSound);
            
            this.cameras.main.shake(100, 0.005);
        }

        function damagePackage(amount) {
            packageIntegrity -= amount;
            packageIntegrity = Math.max(0, packageIntegrity);
            
            const color = packageIntegrity > 50 ? '#00ff00' : packageIntegrity > 25 ? '#ffff00' : '#ff0000';
            packageText.setText('Package: ' + Math.floor(packageIntegrity) + '%');
            packageText.setColor(color);
            
            if (packageIntegrity <= 0) {
                endGame.call(this, false);
            }
        }

        function deliverPackage() {
            if (packageDelivered || gameOver) return;
            
            packageDelivered = true;
            playSound(deliverySound);
            
            score += Math.floor(packageIntegrity * 10) + (wave * 500);
            scoreText.setText('Score: ' + score);
            
            createExplosion.call(this, deliveryPoint.x, deliveryPoint.y, 0x00ff00, true);
            
            const deliveryText = this.add.text(400, 300, 'PACKAGE DELIVERED!', {
                fontSize: '32px',
                fill: '#00ff00',
                fontStyle: 'bold',
                stroke: '#000000',
                strokeThickness: 4
            }).setOrigin(0.5);
            
            this.tweens.add({
                targets: deliveryText,
                scale: 1.2,
                duration: 500,
                yoyo: true,
                onComplete: () => {
                    deliveryText.destroy();
                    nextWave.call(this);
                }
            });
        }

        function nextWave() {
            wave++;
            waveText.setText('Wave: ' + wave);
            packageIntegrity = Math.min(100, packageIntegrity + 20);
            packageText.setText('Package: ' + Math.floor(packageIntegrity) + '%');
            packageText.setColor('#00ff00');
            packageDelivered = false;
            
            repositionDeliveryPoint.call(this);
            
            this.time.delayedCall(2000, () => {
                spawnWave.call(this);
            });
        }

        function repositionDeliveryPoint() {
            const newX = Phaser.Math.Between(600, 750);
            const newY = Phaser.Math.Between(100, 500);
            
            this.tweens.add({
                targets: deliveryPoint,
                x: newX,
                y: newY,
                duration: 1000,
                ease: 'Power2'
            });
        }

        function spawnPowerUp(x, y) {
            const powerUp = this.add.graphics();
            powerUp.x = x;
            powerUp.y = y;
            
            powerUp.fillStyle(0xffff00, 1);
            powerUp.fillStar(0, 0, 5, 8, 15);
            powerUp.lineStyle(2, 0xffffff, 1);
            powerUp.strokeStar(0, 0, 5, 8, 15);
            
            this.physics.add.existing(powerUp);
            powerUp.body.setCircle(15);
            powerUp.body.setVelocity(Phaser.Math.Between(-50, 50), Phaser.Math.Between(-50, 50));
            
            powerUps.add(powerUp);
            
            this.tweens.add({
                targets: powerUp,
                angle: 360,
                duration: 2000,
                repeat: -1
            });
            
            this.time.delayedCall(5000, () => {
                if (powerUp.active) {
                    this.tweens.add({
                        targets: powerUp,
                        alpha: 0,
                        duration: 500,
                        onComplete: () => powerUp.destroy()
                    });
                }
            });
        }

        function collectPowerUp(player, powerUp) {
            powerUp.destroy();
            playSound(powerUpSound);
            
            packageIntegrity = Math.min(100, packageIntegrity + 25);
            packageText.setText('Package: ' + Math.floor(packageIntegrity) + '%');
            packageText.setColor('#00ff00');
            
            score += 50;
            scoreText.setText('Score: ' + score);
            
            createExplosion.call(this, powerUp.x, powerUp.y, 0xffff00, true);
        }

        function createExplosion(x, y, color, large = false) {
            const particleCount = large ? 20 : 10;
            const maxSpeed = large ? 150 : 100;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = this.add.graphics();
                particle.x = x;
                particle.y = y;
                
                const size = Phaser.Math.Between(2, large ? 6 : 4);
                particle.fillStyle(color, 1);
                particle.fillCircle(0, 0, size);
                
                this.physics.add.existing(particle);
                const angle = (Math.PI * 2 * i) / particleCount;
                const speed = Phaser.Math.Between(50, maxSpeed);
                particle.body.setVelocity(
                    Math.cos(angle) * speed,
                    Math.sin(angle) * speed
                );
                
                explosions.add(particle);
                
                this.tweens.add({
                    targets: particle,
                    alpha: 0,
                    scale: 0,
                    duration: Phaser.Math.Between(300, 600),
                    onComplete: () => particle.destroy()
                });
            }
        }

        function endGame(won) {
            gameOver = true;
            
            enemies.children.entries.forEach(enemy => {
                createExplosion.call(this, enemy.x, enemy.y, 0xff0000);
                enemy.destroy();
            });
            
            const message = won ? 'VICTORY!' : 'PACKAGE DESTROYED!';
            const color = won ? '#00ff00' : '#ff0000';
            
            gameOverText = this.add.text(400, 250, message, {
                fontSize: '48px',
                fill: color,
                fontStyle: 'bold',
                stroke: '#000000',
                strokeThickness: 6
            }).setOrigin(0.5);
            
            const finalScoreText = this.add.text(400, 320, 'Final Score: ' + score, {
                fontSize: '32px',
                fill: '#ffffff',
                fontStyle: 'bold',
                stroke: '#000000',
                strokeThickness: 4
            }).setOrigin(0.5);
            
            restartText = this.add.text(400, 380, 'Press SPACE to Restart', {
                fontSize: '24px',
                fill: '#00ffff',
                fontStyle: 'bold'
            }).setOrigin(0.5);
            
            this.tweens.add({
                targets: restartText,
                alpha: 0.3,
                duration: 500,
                yoyo: true,
                repeat: -1
            });
        }

        function restartGame() {
            packageIntegrity = 100;
            score = 0;
            wave = 1;
            enemiesKilled = 0;
            gameOver = false;
            packageDelivered = false;
            canShoot = true;
            
            player.x = 100;
            player.y = 300;
            player.body.setVelocity(0, 0);
            
            deliveryPoint.x = 700;
            deliveryPoint.y = 300;
            
            enemies.clear(true, true);
            bullets.clear(true, true);
            enemyBullets.clear(true, true);
            powerUps.clear(true, true);
            
            if (gameOverText) gameOverText.destroy();
            if (restartText) restartText.destroy();
            
            packageText.setText('Package: 100%');
            packageText.setColor('#00ff00');
            scoreText.setText('Score: 0');
            waveText.setText('Wave: 1');
            
            spawnWave.call(this);
        }

        function playSound(sound) {
            if (sound && sound.play) {
                try {
                    sound.play();
                } catch (e) {}
            }
        }

        function update(time, delta) {
            if (gameOver) {
                if (Phaser.Input.Keyboard.JustDown(spaceKey)) {
                    restartGame.call(this);
                }
                return;
            }

            updateStars();
            updatePlayer.call(this);
            updateEnemies.call(this, time);
            updateBullets();
            updateInput.call(this);
        }

        function updateStars() {
            stars.children.entries.forEach(star => {
                star.y += star.speed;
                if (star.y > 600) {
                    star.y = 0;
                    star.x = Phaser.Math.Between(0, 800);
                }
            });
        }

        function updatePlayer() {
            if (packageDelivered) {
                player.body.setVelocity(0, 0);
                return;
            }
            
            const speed = playerSpeed;
            
            if (cursors.left.isDown || wasd.left.isDown) {
                player.body.setVelocityX(-speed);
            } else if (cursors.right.isDown || wasd.right.isDown) {
                player.body.setVelocityX(speed);
            }
            
            if (cursors.up.isDown || wasd.up.isDown) {
                player.body.setVelocityY(-speed);
            } else if (cursors.down.isDown || wasd.down.isDown) {
                player.body.setVelocityY(speed);
            }
        }

        function updateEnemies(time) {
            enemies.children.entries.forEach(enemy => {
                if (!enemy.active) return;
                
                const distance = Phaser.Math.Distance.Between(enemy.x, enemy.y, player.x, player.y);
                
                if (distance > 150) {
                    this.physics.moveToObject(enemy, player, 100 + (wave * 10));
                } else {
                    const angle = Phaser.Math.Angle.Between(enemy.x, enemy.y, player.x, player.y);
                    const perpAngle = angle + Math.PI / 2;
                    enemy.body.setVelocity(
                        Math.cos(perpAngle) * 80,
                        Math.sin(perpAngle) * 80
                    );
                }
                
                enemy.shootTimer += 16;
                if (enemy.shootTimer >= enemy.shootDelay) {
                    enemyShoot.call(this, enemy);
                    enemy.shootTimer = 0;
                    enemy.shootDelay = Phaser.Math.Between(1500, 3000);
                }
                
                if (enemy.x < -50 || enemy.x > 850 || enemy.y < -50 || enemy.y > 650) {
                    enemy.destroy();
                }
            });
        }

        function updateBullets() {
            bullets.children.entries.forEach(bullet => {
                if (bullet.x > 850) {
                    bullet.destroy();
                }
            });
            
            enemyBullets.children.entries.forEach(bullet => {
                if (bullet.x < -50 || bullet.x > 850 || bullet.y < -50 || bullet.y > 650) {
                    bullet.destroy();
                }
            });
        }

        function updateInput() {
            if (Phaser.Input.Keyboard.JustDown(spaceKey)) {
                shootBullet.call(this);
            }
        }
    </script>
</body>
</html>
